# ToDo: better network config (namespaces?)
# requires 2 veth pairs: ep1,2 and ep3,4.
# ep1 is 10.10.1.20, ep3 is 10.10.3.30, ep4 is 10.10.4.30
# an arp entry is needed : sudo arp -i ep3 -s 10.10.4.30 <MAC of ep4>


[interfaces]

if1 = eth iface=ep2
if1:streams = s1

if3 = eth iface=ep3

if4 = eth iface=ep4
if4:streams = s2

if5 = eth iface=ep1

if6 = oam_cmd ip=127.0.0.1 port=8000
if7 = oam ip=127.0.0.1 port=6634
if8 = oam_eth iface=ep2.100
if9 = oam_eth iface=ep1.100

[objects]

prf1 = SeqGen
srcvy1 = SeqRcvy
#srcvy1 = SeqRcvy frerSeqRcvyAlgorithm=Match
repl1 = Replicate
pof1 = Pof BufferSize=50 MaxDelay=100 TakeAnyTime=1000

[oam]
oam1 = ping@01:80:C2:00:00:34+100 mepn1s1 in12 4 -r -o -d
#oam2 = ping s1:mepn1s1 in12 4 -d

#oam2 = rping s1:mepn1s1 s2:mepn1s2 in12 4 -r
#            local_strm:local_mep remote_strm:remote_mep mip level, opts

[streams]

s1:packet = eth, cvlan          ; now we can have comments at the end
s1:match = cvlan vid=0       # both start characters are supported
s1:actions = prf1, after cvlan add rtag, edit cvlan.vid=100, mep-start mepn1s1 4, repl1 out1
#out1 = edit eth.dmac=01:80:C2:00:00:34, send if3
out1 = send if3

s2:packet = eth, cvlan, rtag
s2:match = cvlan vid=100
s2:actions = mip in12 4, edit eth.dmac=01:80:C2:00:00:34, del rtag, send if5

#ping s1:mepn1s1 in1 4
