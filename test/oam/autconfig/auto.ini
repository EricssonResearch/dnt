[interfaces]
i1 = internal
i1:streams = Rmatch Reditbefore Reditafter Rnoaddr
i2 = internal
i2:streams = Ematch2 Eeditbefore2 Eeditafter2 Enoaddr2
i3 = internal
i3:streams = Ematch3 Eeditbefore3 Eeditafter3 Enoaddr3

cmd0 = oam_cmd

[objects]
G = SeqGen

RforMatch = Replicate AutoMIP=3
RforEditBefore = Replicate AutoMIP=4
RforEditAfter = Replicate AutoMIP=5
RforNoAddr = Replicate AutoMIP=6

EforMatch = SeqRcvy AutoMIP=3
EforEditBefore = SeqRcvy AutoMIP=4
EforEditAfter = SeqRcvy AutoMIP=5
EforNoAddr = SeqRcvy AutoMIP=6

[streams]
;;; replicate tests i1 -> {i2 i3}

; address in match
Rmatch:packet = mpls, dcw
Rmatch:match = mpls label=2000
Rmatch:actions = G, writeseq dcw, RforMatch Rmatch1 Rmatch2
Rmatch1 = edit mpls.ttl=13, send i2
Rmatch2 = edit mpls.ttl=14, send i3

; address edit before repl
Reditbefore:packet = mpls, dcw
Reditbefore:match = mpls ttl=32
Reditbefore:actions = G, writeseq dcw, edit mpls.label=234, RforEditBefore Reditbefore1 Reditbefore2
Reditbefore1:masked = edit mpls.ttl=13, send i2
Reditbefore2 = edit mpls.ttl=14, send i3

; address edit after repl
; TODO 2 cases: mpls was received, mpls was added
Reditafter:packet = mpls, dcw
Reditafter:match = mpls ttl=34
Reditafter:actions = G, writeseq dcw, RforEditAfter Reditafter1 Reditafter2
Reditafter1 = edit mpls.ttl=13 mpls.label=654, send i2
Reditafter2:masked = edit mpls.ttl=14 mpls.label=456, send i3

; missing address
Rnoaddr:packet = mpls, dcw
Rnoaddr:match = mpls ttl=42
Rnoaddr:actions = G, writeseq dcw, RforNoAddr Rnoaddr1 Rnoaddr2
Rnoaddr1 = edit mpls.ttl=13, send i2
Rnoaddr2 = edit mpls.ttl=14, send i3


;;; eliminate tests {i2 i3} -> i1

; address in match
Ematch2:packet = mpls, dcw
Ematch2:match = mpls label=2002
Ematch2:actions = edit mpls.ttl=22, readseq dcw, EforMatch Ematch
Ematch3:packet = mpls, dcw
Ematch3:match = mpls label=3003
Ematch3:actions = readseq dcw, edit mpls.ttl=33, EforMatch Ematch
Ematch = send i1

; address edit before elim
Eeditbefore2:packet = mpls, dcw
Eeditbefore2:match = mpls ttl=32
Eeditbefore2:actions = edit mpls.label=321, readseq dcw, EforEditBefore Eeditbefore
Eeditbefore3:packet = mpls, dcw
Eeditbefore3:match = mpls ttl=33
Eeditbefore3:actions = readseq dcw, edit mpls.label=323, EforEditBefore Eeditbefore
Eeditbefore = send i1

; address edit after elim
Eeditafter2:packet = mpls, dcw
Eeditafter2:match = mpls ttl=42
Eeditafter2:actions = readseq dcw, EforEditAfter Eeditafter
Eeditafter3:packet = mpls, dcw
Eeditafter3:match = mpls ttl=43
Eeditafter3:actions = readseq dcw, EforEditAfter Eeditafter
Eeditafter = edit mpls.label=424, send i1

; missing address
Enoaddr2:packet = mpls, dcw
Enoaddr2:match = mpls ttl=61
Enoaddr2:actions = readseq dcw, EforNoAddr Enoaddr
Enoaddr3:packet = mpls, dcw
Enoaddr3:match = mpls ttl=63
Enoaddr3:actions = readseq dcw, EforNoAddr Enoaddr
Enoaddr = edit mpls.ttl=35, send i1

