# ToDo: better network config (namespaces?)
# requires 2 veth pairs: ep1,2 and ep3,4.
# ep1 is 10.10.1.20, ep3 is 10.10.3.30, ep4 is 10.10.4.30
# an arp entry is needed : sudo arp -i ep3 -s 10.10.4.30 <MAC of ep4>

[interfaces]

if1 = eth iface=ep2
if1:streams = s1

if3 = udp-out iface=ep3 dstip=10.10.4.30

if4 = udp-in iface=ep4 ipv=4
if4:streams = s2

if5 = oam_cmd oam_cmd_ip=127.0.0.1 oam_cmd_port=8000
if6 = oam oam_ip=127.0.0.1 oam_port=6634

[objects]

prf1 = SeqGen
srcvy1 = SeqRcvy
repl1 = Replicate
pof1 = Pof BufferSize=50 MaxDelay=100 TakeAnyTime=1000

[oam]
oam1 = ping s1:mepn1s1 any 4 -r
oam2 = ping s1:mepn1s1 in12 4 -d

#oam2 = rping s1:mepn1s1 s2:mepn1s2 in12 4 -r
#            local_strm:local_mep remote_strm:remote_mep mip level, opts

[streams]

s1:packet = eth, cvlan          ; now we can have comments at the end
s1:match = cvlan vid=0       # both start characters are supported
s1:actions = prf1, del cvlan, before eth add mpls, after mpls add dcw, mep-start mepn1s1 4, writeseq dcw, edit mpls.label=703710 mpls.bos=1 mpls.ttl=64, mip in1 4 prf1, edit mpls.label=12, send if3

s2:packet = mpls, dcw
s2:match = mpls label=12
s2:actions = mip in12 4, edit mpls.label=23, send if3

#ping s1:mepn1s1 in1 4
