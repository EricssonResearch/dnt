
[interfaces]

if1 = eth iface=eno1
if1:streams = s1
if2 = eth iface=ep2
if2:streams = s2
if3 = ip iface=ep2
if3:streams = s2

if4 = oam_cmd oam_cmd_ip=::12 oam_cmd_port=8000 ipv=6
if5 = oam oam_ip=::1 oam_port=6634 ipv=6


[objects]

sgen1 = SeqGen
srcvy1 = SeqRcvy

[streams]

s1:packet = eth, cvlan          ; now we can have comments at the end
s1:match = cvlan vid=0       # both start characters are supported
s1:actions = send if2

s2:packet = eth, cvlan
s2:match = cvlan vid=0
s2:actions = send if1
