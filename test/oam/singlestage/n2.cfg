[interfaces]
pw12_in = udp-in iface=eth21 ipv=4 port=1000
pw12_in:streams = rx12
pw123_out = udp-out iface=eth23 dstip=23.0.0.3 dstport=1000
pw124_out = udp-out iface=eth24 dstip=24.0.0.4 dstport=1000

cmd0 = oam_cmd oam_cmd_ip=10.0.0.2 oam_cmd_port=8000
oam0 = oam oam_ip=10.0.0.2 oam_port=6634

[objects]
prf2 = Replicate

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
rx12:packet = mpls, dcw
rx12:match = mpls label=112
rx12:actions = mip s1n2-i3-12 3 prf2, prf2 tx123 tx124
tx123 = edit mpls.label=123, send pw123_out
tx124 = edit mpls.label=124, send pw124_out
