[interfaces]
pw12_in = udp-in iface=eth21 ipv=4
pw12_in:streams = rx12
pw23_out = udp-out iface=eth23 dstip=23.0.0.3
pw24_out = udp-out iface=eth24 dstip=24.0.0.4

cmd0 = oam_cmd oam_cmd_ip=10.0.0.2 oam_cmd_port=8000
oam0 = oam oam_ip=10.0.0.2 oam_port=6634

[objects]
prf2 = Replicate

[streams]
rx12:packet = mpls, dcw
rx12:match = mpls label=12
rx12:actions = mip in12 4 prf2, prf2 tx1 tx2
tx1 = edit mpls.label=23, send pw23_out
tx2 = edit mpls.label=24, send pw24_out
