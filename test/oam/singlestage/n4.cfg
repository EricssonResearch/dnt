[interfaces]
pw24_in = udp-in iface=eth42 ipv=4
pw34_in = udp-in iface=eth43 ipv=4
pw24_in:streams = rx24
pw34_in:streams = rx34
uni = eth iface=eth0

cmd0 = oam_cmd oam_cmd_ip=10.0.0.4 oam_cmd_port=8000
oam0 = oam oam_ip=10.0.0.4 oam_port=6634

[objects]
pef4 = SeqRcvy

[streams]
rx24:packet = mpls, dcw, eth
rx34:packet = mpls, dcw, eth
rx24:match = mpls label=24
rx34:match = mpls label=34
rx24:actions = mip in24 4, jump rx
rx34:actions = mip in34 4, jump rx
rx = readseq dcw, pef4, mep-stop mepn4s1 4 pef4, del mpls, del dcw, send uni
