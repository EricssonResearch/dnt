[interfaces]
pw124_in = udp-in iface=eth42 ipv=4 port=1000
pw134_in = udp-in iface=eth43 ipv=4 port=1000
pw124_in:streams = rx124
pw134_in:streams = rx134
uni = eth iface=eth0
uni:streams = s2

pw242_out = udp-out iface=eth42 ipv=4 dstip=12.0.0.1 dstport=2000
pw243_out = udp-out iface=eth43 ipv=4 dstip=13.0.0.1 dstport=2000

pw324_in = udp-in iface=eth42 ipv=4 port=3000
pw334_in = udp-in iface=eth43 ipv=4 port=3000
pw324_in:streams = rx324
pw334_in:streams = rx334

cmd0 = oam_cmd oam_cmd_ip=10.0.0.4 oam_cmd_port=8000
oam0 = oam oam_ip=10.0.0.4 oam_port=6634

[objects]
pef4 = SeqRcvy
prf4 = Replicate
seqgen4 = SeqGen

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
rx124:packet = mpls, dcw, eth
rx134:packet = mpls, dcw, eth
rx124:match = mpls label=124
rx134:match = mpls label=134
rx124:actions = mep-stop s1n4-e3-24 3, mip s1n4-i4-24 4, jump rx
rx134:actions = mip s1n4-i4-34 4, jump rx
rx = readseq dcw, pef4, mep-stop s1n4-e4-40 4 pef4, del mpls, del dcw, send uni

s2:packet = eth, cvlan
s2:match = cvlan vid=2
s2:actions = seqgen4, before eth add mpls bos=1 ttl=64, after mpls add dcw, mep-start s2n4-e5-04 5 prf4, writeseq dcw, prf4 tx242 tx243
tx242 = edit mpls.label=242, send pw242_out
tx243 = edit mpls.label=243, send pw243_out

rx324:packet = mpls, dcw, eth
rx334:packet = mpls, dcw, eth
rx324:match = mpls label=313
rx334:match = mpls label=313
rx324:actions = mip s3n4-i4-24 4, mep-stop s3n4-e1-24 1, jump s3rx
rx334:actions = mip s3n4-i4-34 4, jump s3rx
s3rx = readseq dcw, pef4, mep-stop s3n4-e4-40 4 pef4, del mpls, del dcw, send uni

