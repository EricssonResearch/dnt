[interfaces]
uni = eth iface=eth0
uni:streams = stream_uni
pw12_out = udp-in iface=eth12 dstip=12.0.0.2
pw13_out = udp-in iface=eth13 dstip=13.0.0.3

cmd0 = oam_cmd oam_cmd_ip=0.0.0.0 oam_cmd_port=8000
oam0 = oam oam_ip=10.0.0.1 oam_port=6634

[objects]
prf1 = SeqGen

[streams]
stream_uni:packet = eth, cvlan
stream_uni:match = cvlan vid=0
stream_uni:actions = prf1, before cvlan add mpls, after mpls add dcw, writeseq dcw, del cvlan, replicate tx1 tx2
tx1 = edit mpls.label=12, send pw12_out
tx2 = edit mpls.label=13, send pw13_out
