[interfaces]
uni = eth iface=eth0
uni:streams = s1 s3
pw112_out = udp-out iface=eth12 dstip=12.0.0.2 dstport=1000
pw113_out = udp-out iface=eth13 dstip=13.0.0.3 dstport=1000

pw242_in = udp-in iface=eth12 port=2000
pw243_in = udp-in iface=eth13 port=2000
pw242_in:streams = rx242
pw243_in:streams = rx243

pw313_out = udp-out iface=eth13 dstip=13.0.0.3 dstport=3000

cmd0 = oam_cmd ;ip=10.0.0.1 port=8000
oam0 = oam ip=10.0.0.1 port=6634

[objects]
seqgen1 = SeqGen
seqgen3 = SeqGen
prf1 = Replicate
pef1 = SeqRcvy

[oam]
oam1 = ping s1:s1n1-e4-01 s1n4-e3-24 4 -r
oam3 = ping s3:s3n1-e4-01 s3n4-e4-40 4 -r

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
s1:packet = eth, cvlan
s1:match = cvlan vid=0
s1:actions = seqgen1, before eth add mpls bos=1 ttl=64, after mpls add dcw, del cvlan, mep-start s1n1-e4-01 4 prf1, writeseq dcw, prf1 tx112 tx113
tx112 = mep-start s1n1-e3-12 3, edit mpls.label=112, send pw112_out
tx113 = edit mpls.label=113, send pw113_out

rx242:packet = mpls, dcw, eth
rx243:packet = mpls, dcw, eth
rx242:match = mpls label=242
rx243:match = mpls label=243
rx242:actions = mip s2n1-i5-21 5, jump s2rx
rx243:actions = mip s2n1-i5-31 5, jump s2rx
s2rx = readseq dcw, pef1, mep-stop s2n1-e5-10 5 pef1, del dcw, del mpls, send uni

s3:packet = eth, cvlan
s3:match = cvlan vid=3
s3:actions = seqgen3, before eth add mpls bos=1 ttl=64, after mpls add dcw, mep-start s3n1-e4-01 4, edit mpls.label=313, send pw313_out
