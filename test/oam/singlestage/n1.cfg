[interfaces]
uni = eth iface=eth0
uni:streams = s1
pw12_out = udp-out iface=eth12 dstip=12.0.0.2
pw13_out = udp-out iface=eth13 dstip=13.0.0.3

cmd0 = oam_cmd oam_cmd_ip=10.0.0.1 oam_cmd_port=8000
oam0 = oam oam_ip=10.0.0.1 oam_port=6634

[objects]
seqgen1 = SeqGen
prf1 = Replicate

[streams]
s1:packet = eth, cvlan
s1:match = cvlan vid=0
s1:actions = seqgen1, before eth add mpls bos=1 ttl=64, after mpls add dcw, del cvlan, mep-start mepn1s1 4 prf1, writeseq dcw, prf1 tx1 tx2
tx1 = edit mpls.label=12, send pw12_out
tx2 = edit mpls.label=13, send pw13_out
