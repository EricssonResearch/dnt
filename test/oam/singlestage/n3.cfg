[interfaces]
pw113_in = udp-in iface=eth31 ipv=4 port=1000
pw123_in = udp-in iface=eth32 ipv=4 port=1000
pw113_in:streams = rx113
pw123_in:streams = rx123
pw134_out = udp-out iface=eth34 dstip=34.0.0.4 dstport=1000

pw313_in = udp-in iface=eth31 ipv=4 port=3000
pw313_in:streams = rx313
pw332_out = udp-out iface=eth32 dstip=24.0.0.4 dstport=3000
pw334_out = udp-out iface=eth34 dstip=34.0.0.4 dstport=3000

cmd0 = oam_cmd ;ip=10.0.0.3 port=8000
oam0 = oam ip=10.0.0.3 port=6634

[objects]
pef3 = SeqRcvy
pof3 = Pof BufferSize=10 MaxDelay=1000 TakeAnyTime=5000
repl3 = Replicate

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
rx113:packet = mpls, dcw
rx123:packet = mpls, dcw
rx113:match = mpls label=113
rx123:match = mpls label=123
rx113:actions = mip s1n3-i4-13 4, jump s1rx
rx123:actions = mep-stop s1n3-e3-23 3, mip s1n3-i4-23 4, jump s1rx
# s1rx = readseq dcw, pef3, pof3, mip s1n3-i-34 4 pef3, mip out34pof 4 pof3, edit mpls.label=134, send pw134_out
s1rx = readseq dcw, pef3 s1rx_cont
s1rx_cont = mip s1n3-i4-34 4 pef3, edit mpls.label=134, send pw134_out

rx313:packet = mpls, dcw
rx313:match = mpls label=313
rx313:actions = mip s3n3-i4-13 4 repl3, repl3 tx332 tx334
# edit label required, parsing error otherwise
tx332 = mep-start s3n3-e1-32 1, edit mpls.label=313, send pw332_out
tx334 = send pw334_out
