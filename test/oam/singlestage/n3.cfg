[interfaces]
pw13_in = udp-in iface=eth31 ipv=4
pw23_in = udp-in iface=eth32 ipv=4
pw13_in:streams = rx13
pw23_in:streams = rx23
pw34_out = udp-in iface=eth34 dstip=24.0.0.4

cmd0 = oam_cmd oam_cmd_ip=0.0.0.0 oam_cmd_port=8000
oam0 = oam oam_ip=10.0.0.3 oam_port=6634

[objects]
pef3 = SeqRcvy

[streams]
rx13:packet = mpls, dcw
rx23:packet = mpls, dcw
rx13:match = mpls label=13
rx23:match = mpls label=23
rx13:actions = jump rx
rx23:actions = jump rx
rx = readseq dcw, pef3, edit mpls.label=34, send pw34_out
