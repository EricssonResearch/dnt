; based on getting_started/scenario_tsn

[interfaces]
uni = eth iface=swp2
uni:streams = stream_uni
nni1 = eth iface=swp0
nni1:streams = stream_nni1
nni2 = eth iface=swp1
nni2:streams = stream_nni2

[objects]
seq_gen = SeqGen InitSeqStart=0
seqrcvy = SeqRcvy frerSeqRcvyHistoryLength=16
reorder = Pof BufferSize=512

[streams]
stream_uni:packet = eth, cvlan
stream_uni:match = cvlan vid=0
stream_uni:actions = seq_gen, after cvlan add rtag, after rtag add ttag, replicate tx_nni1 tx_nni2

tx_nni1 = edit cvlan.vid=100, send nni1
tx_nni2 = edit cvlan.vid=200, send nni2

stream_nni1:packet = eth, cvlan, rtag, ttag
stream_nni1:match = cvlan vid=100
stream_nni1:actions = nni_common

stream_nni2:packet = eth, cvlan, rtag, ttag
stream_nni2:match = cvlan vid=200
stream_nni2:actions = nni_common

nni_common = readseq rtag, readtstamp ttag, seqrcvy nni_cont
nni_cont = del rtag, del cvlan, del ttag, reorder, delay 10, send uni
