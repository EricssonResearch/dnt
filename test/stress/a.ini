[interfaces]
uni = eth iface=eth0
uni:streams = s1
pw11_out = udp-out iface=ab0 dstip=11.0.0.2
pw22_out = udp-out iface=ab1 dstip=22.0.0.2
nni0 = udp-in iface=ab0 ipv=4
nni0:streams = snni
nni1 = udp-in iface=ab1 ipv=4
nni1:streams = snni

cmd0 = oam_cmd ip=10.0.0.1 port=8000
oam0 = oam ip=10.0.0.1 port=6634

[objects]
gen1 = SeqGen
prf1 = Replicate
pef1 = SeqRcvy

[streams]
s1:packet = eth, cvlan
s1:match = cvlan vid=0
s1:actions = gen1, before eth add mpls bos=1 ttl=64, after mpls add dcw, del cvlan, mep-start start1 4, writeseq dcw, prf1 tx1 tx2
tx1 = edit mpls.label=2, send pw11_out
tx2 = edit mpls.label=2, send pw22_out

snni:packet = mpls, dcw, eth
snni:match = mpls label=1
snni:actions = readseq dcw, pef1, mep-stop stop1 4 pef1, del mpls, del dcw, send uni
