[interfaces]
uni = eth iface=eth0
uni:streams = s1
pw11_out = udp-out iface=ba0 dstip=11.0.0.1
pw22_out = udp-out iface=ba1 dstip=22.0.0.1
nni0 = udp-in iface=ba0 ipv=4
nni0:streams = snni
nni1 = udp-in iface=ba1 ipv=4
nni1:streams = snni

cmd0 = oam_cmd ip=10.0.0.2 port=8000
oam0 = oam ip=10.0.0.2 port=6634

[objects]
gen2 = SeqGen
prf2 = Replicate
pef2 = SeqRcvy

[streams]
s1:packet = eth, cvlan
s1:match = cvlan vid=0
s1:actions = gen2, before eth add mpls bos=1 ttl=64, after mpls add dcw, del cvlan, writeseq dcw, prf2 tx1 tx2
tx1 = edit mpls.label=1, send pw11_out
tx2 = edit mpls.label=1, send pw22_out

snni:packet = mpls, dcw, eth
snni:match = mpls label=2
snni:actions = readseq dcw, pef2, mip mip2 4 prf2, mep-stop stop2 4 pef2, del mpls, del dcw, send uni
