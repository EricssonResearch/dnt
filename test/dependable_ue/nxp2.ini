[interfaces]

uni_in = eth iface=swp0
; uni_in = eth iface=r2eth1 ;use this after configure_tc command
uni_out = ip iface=swp0

v4nni_in0 = udp-in iface=swp1 ipv=4
v4nni_in1 = udp-in iface=swp2 ipv=4
v4nni_in2 = udp-in iface=swp3 ipv=4

v4nni_out0 = udp-out iface=swp1 dstip=192.168.55.1
v4nni_out1 = udp-out iface=swp2 dstip=192.168.66.1
v4nni_out2 = udp-out iface=swp3 dstip=192.168.77.1

uni_in:streams = compound4
v4nni_in0:streams = pw41
v4nni_in1:streams = pw42
v4nni_in2:streams = pw43


cmd0 = oam_cmd ip=127.0.0.1 port=8000
oam0 = oam ip=192.168.111.2 port=6634

notif = udp-out iface=eno0 dstip=192.168.111.3  dstport=9000

[objects]

gen4 = SeqGen

pef2_4 = SeqRcvy frerSeqRcvyHistoryLength=16 frerSeqRcvyLatentErrorPaths=3

prf2_4 = Replicate

[streams]

compound4:packet = eth, cvlan, ipv4
compound4:match = cvlan tpid=ipv4, ipv4 src=10.0.200.0/24
compound4:actions = gen4, del eth, del cvlan, before ipv4 add dcw, before dcw add mpls bos=1, mep-start compound4_L4_pre-prf2_4 4 prf2_4, prf2_4 prf4-member1 prf4-member2 prf4-member3

prf4-member1 = edit mpls.label=400 mpls.bos=1, send v4nni_out0
prf4-member2 = edit mpls.label=400 mpls.bos=1, send v4nni_out1
prf4-member3 = edit mpls.label=400 mpls.bos=1, send v4nni_out2

pw41:packet = mpls, dcw, ipv4
pw41:match = mpls label=400
pw41:actions = readseq dcw, mip pw41_L4_pre-pef2_4 4, pef2_4 compound
pw42:packet = mpls, dcw, ipv4
pw42:match = mpls label=400
pw42:actions = readseq dcw, mip pw42_L4_pre-pef2_4 4, pef2_4 compound
pw43:packet = mpls, dcw, ipv4
pw43:match = mpls label=400
pw43:actions = readseq dcw, mip pw43_L4_pre-pef2_4 4, pef2_4 compound

compound = mep-stop compound_L4_post-pef2_4 4 pef2_4, del mpls, del dcw, send uni_out

; Notifications
notification_session = send notif
