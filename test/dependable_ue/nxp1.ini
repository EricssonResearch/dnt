[interfaces]

uni_in = eth iface=swp0
; uni_in = eth iface=dnteth1 ;use this after configure_tc command
uni_out = ip iface=swp0

v4nni_in0 = udp-in iface=swp1 ipv=4
v4nni_in1 = udp-in iface=swp2 ipv=4
v4nni_in2 = udp-in iface=swp3 ipv=4

v4nni_out0 = udp-out iface=swp1 dstip=192.168.55.2
v4nni_out1 = udp-out iface=swp2 dstip=192.168.66.2
v4nni_out2 = udp-out iface=swp3 dstip=192.168.77.2

uni_in:streams = compound4

v4nni_in0:streams = pw4
v4nni_in1:streams = pw4
v4nni_in2:streams = pw4

cmd0 = oam_cmd ip=127.0.0.1 port=8000
oam0 = oam ip=192.168.111.1 port=6634

notif = udp-out iface=eno0 dstip=192.168.111.3  dstport=9000

[objects]

gen4 = SeqGen
gen6 = SeqGen

pef1_4 = SeqRcvy frerSeqRcvyHistoryLength=16 frerSeqRcvyLatentErrorPaths=3

prf1_4 = Replicate

[oam]
oam1 = ping compound4_L4_pre-prf1_4 compound_L4_post-pef2_4 4 -i 0.1

[streams]

compound4:packet = eth, cvlan, ipv4
compound4:match = cvlan tpid=ipv4, ipv4 src=10.0.100.0/24
compound4:actions = gen4, del eth, del cvlan, before ipv4 add dcw, before dcw add mpls label=400 bos=1, mep-start compound4_L4_pre-prf1_4 4 prf1_4, prf1_4 prf4-member1 prf4-member2 prf4-member3

prf4-member1 = edit mpls.label=400 mpls.bos=1, send v4nni_out0
prf4-member2 = edit mpls.label=400 mpls.bos=1, send v4nni_out1
prf4-member3 = edit mpls.label=400 mpls.bos=1, send v4nni_out2

pw4:packet = mpls, dcw, ipv4
pw4:match = mpls label=400
pw4:actions = readseq dcw, mip pw4_L4_pre-pef1_4 4, pef1_4 compound

compound = mep-stop compound_L4_post-pef1_4 4 pef1_4, del mpls, del dcw, send uni_out

; Notifications
notification_session = send notif
