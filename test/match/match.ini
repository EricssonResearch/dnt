
[interfaces]

if_in = eth iface=r2rx
if_in:streams = s1 s2
if_out = eth iface=r2tx

[streams]

s1:packet = eth, cvlan          ; now we can have comments at the end
s1:match = cvlan vid=2023
s1:actions = send if_out

s2:packet = eth, cvlan, ipv4
s2:match = ipv4 src=1.2.3.4
s2:actions = send if_out
