
[interfaces]

if_in = eth iface=r2rx
if_in:streams = s00 s01 s10 s11 s12 s20 s21 s22 s30 s31 s32 s40 s41
if_out = eth iface=r2tx

[streams]
# Ethernet test streams
s00:packet = eth
s00:match = eth dmac=aa:bb:cc:aa:bb:cc
s00:actions = send if_out

s01:packet = eth
s01:match = eth smac=dd:ee:ff:dd:ee:fe
s01:actions = send if_out

# VLAN test streams
s10:packet = eth, cvlan
s10:match = cvlan vid=2023
s10:actions = send if_out

s11:packet = eth, cvlan
s11:match = cvlan vid=1111 pcp=5
s11:actions = send if_out

s12:packet = eth, cvlan
s12:match = cvlan pcp=2
s12:actions = send if_out

# IPv4 test streams
s20:packet = eth, cvlan, ipv4
s20:match = ipv4 src=1.2.3.4 ttl=66
s20:actions = send if_out

s21:packet = eth, cvlan, ipv4
s21:match = ipv4 src=9.9.9.9 dst=7.7.7.7
s21:actions = send if_out

s22:packet = eth, cvlan, ipv4
s22:match = ipv4 src=9.9.9.9 dst=7.7.7.8 ttl=22
s22:actions = send if_out

# IPv6 test streams
s30:packet = eth, cvlan, ipv6
s30:match = ipv6 src=cafe::face hoplimit=66
s30:actions = send if_out

s31:packet = eth, cvlan, ipv6
s31:match = ipv6 src=dead::face dst=dead::cafe
s31:actions = send if_out

s32:packet = eth, cvlan, ipv6
s32:match = ipv6 src=face::cafe dst=dead::dead hoplimit=66
s32:actions = send if_out

# Large stack
s40:packet = eth, cvlan, svlan, ipv4, udp, mpls, ipv6
s40:match = mpls label=4444
; s40:match = cvlan vid=2025
s40:actions = send if_out

s41:packet = eth, cvlan_1, svlan, ipv4, udp, mpls, cvlan_2, ipv6
s41:match = mpls label=1048575, cvlan_2 vid=33
s41:actions = send if_out

