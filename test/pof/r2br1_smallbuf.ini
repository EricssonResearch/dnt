
[interfaces]

uni = eth iface=r2br1_uni
uni:streams = suni
nni0 = eth iface=r2br1_nni0
nni0:streams = snni
nni1 = eth iface=r2br1_nni1
nni1:streams = snni

[objects]

gen_nni = SeqGen InitSeqStart=0
rcvy_nni = SeqRcvy frerSeqRcvyResetMsec=1000
mypof = Pof BufferSize=2 MaxDelay=100 TakeAnyTime=1000

[streams]

suni:packet = eth, cvlan
suni:match = cvlan vid=0
suni:actions = gen_nni, after cvlan add rtag, edit cvlan.vid=200, writeseq rtag, replicate to_nni0 to_nni1

to_nni0 = send nni0
to_nni1 = send nni1

snni:packet = eth, cvlan, rtag
snni:match = cvlan vid=100
snni:actions = readseq rtag, rcvy_nni, del rtag, del cvlan, pof mypof, send uni
