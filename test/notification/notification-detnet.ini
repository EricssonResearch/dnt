
[interfaces]

if1 = eth iface=r2rx
if1:streams = s2 s3
if2 = ip iface=r2tx
if2:streams = s1
if3 = udp-in iface=r2rx ipv=4       # just for ip change test
if4 = udp-out iface=r2tx dstip=10.0.2.4

if5 = oam_cmd ip=127.0.0.1 port=8000
if6 = oam ip=127.0.0.1 port=6634

notif = udp-out iface=lo dstip=127.0.0.1 dstport=9000
notif6 = udp-out iface=lo dstip=::1 dstport=9600


[objects]

prf = Replicate AutoMIP=5
sgen1 = SeqGen
srcvy1 = SeqRcvy frerSeqRcvyHistoryLength=15 frerSeqRcvyLatentErrorPaths=2 AutoMIP=5

[streams]

s1:packet = ipv4
s1:match = ipv4 version=4 dst=10.0.4.0/24
s1:actions = send if1

s2:packet = eth, cvlan, ipv4
s2:match = ipv4 version=4 dst=7.7.7.7
s2:actions = sgen1, del eth, del cvlan, before ipv4 add dcw, before dcw add mpls bos=1, prf to_nni0 to_nni1
to_nni0 = edit mpls.label=400, readseq dcw, srcvy1 common_actions
to_nni1 = edit mpls.label=500, readseq dcw, srcvy1 common_actions
#common_actioncss = del mpls, del dcw, send if2
common_actions = send if4


s3:packet = eth, cvlan, ipv4
s3:match = ipv4 version=4 dst=8.8.8.8
s3:actions =  del eth, del cvlan, before ipv4 add tcw, before tcw add mpls bos=1, writetstamp tcw, delay 100, readtstamp tcw, delay 1, del mpls, del tcw, send if2

; Notifications
notification_session = send notif, send notif6
