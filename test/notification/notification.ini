
[interfaces]

if1 = eth iface=r2rx
if1:streams = s2 s3
if2 = eth iface=r2tx
if2:streams = s1
if3 = udp-in iface=r2rx ipv=4       # just for ip change test


if5 = oam_cmd ip=127.0.0.1 port=8000
if6 = oam ip=127.0.0.1 port=6634

notif = udp-out iface=lo dstip=127.0.0.1 dstport=9000
notif6 = udp-out iface=lo dstip=::1 dstport=9600


[objects]

rep = Replicate
sgen1 = SeqGen InitSeqStart=0
srcvy1 = SeqRcvy frerSeqRcvyHistoryLength=15

[streams]

s1:packet = eth, cvlan          ; now we can have comments at the end
s1:match = cvlan vid=0       # both start characters are supported
s1:actions = send if1

s2:packet = eth, cvlan
s2:match = cvlan vid=1000
s2:actions = sgen1, after cvlan add rtag, writeseq rtag, rep to_nni0 to_nni1
to_nni0 = readseq rtag, srcvy1 common_actions
to_nni1 = readseq rtag, srcvy1 common_actions
common_actions = del rtag, send if2

s3:packet = eth, cvlan
s3:match = cvlan vid=2000
s3:actions = after cvlan add ttag, writetstamp ttag, delay 100, send if2, readtstamp ttag, delay 1, send if2

; Notifications
notification_session = send notif, send notif6
