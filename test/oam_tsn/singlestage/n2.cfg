[interfaces]
iface_21 = eth iface=eth21 # s1_in
iface_21:streams = s1_rx12
iface_23 = eth iface=eth23 # s1_out_23
iface_24 = eth iface=eth24 # s1_out_24

cmd0 = oam_cmd ;ip=10.0.0.2 port=8000
oam0 = oam ip=10.0.0.2 port=6634

[objects]
prf2 = Replicate

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
s1_rx12:packet =eth, cvlan, rtag
s1_rx12:match = cvlan vid=112
s1_rx12:actions = mip s1n2-i3-12 3 prf2, prf2 tx123 tx124
tx123 = edit cvlan.vid=123, send iface_23
tx124 = edit cvlan.vid=124, send iface_24
