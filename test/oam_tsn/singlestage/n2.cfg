[interfaces]
iface_21 = eth iface=eth21 # s1_in, s2_out
iface_21:streams = s1_rx12
iface_23 = eth iface=eth23 # s1_out_23, s3_in
iface_23:streams = s3_rx32
iface_24 = eth iface=eth24 # s1_out_24, s3_out, s2_in
iface_24:streams = s2_rx42

cmd0 = oam_cmd ;ip=10.0.0.2 port=8000
oam0 = oam ip=10.0.0.2 port=6634
oam1 = oam_eth iface=eth_m

[objects]
prf2 = Replicate

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
s1_rx12:packet =eth, cvlan, rtag
s1_rx12:match = cvlan vid=112
s1_rx12:actions = mip s1n2-i3-12 3 prf2, prf2 tx123 tx124
tx123 = edit cvlan.vid=123, send iface_23
tx124 = edit cvlan.vid=124, send iface_24

s3_rx32:packet =eth, cvlan, rtag
s3_rx32:match = cvlan vid=313
s3_rx32:actions = send iface_24

s2_rx42:packet =eth, cvlan, rtag
s2_rx42:match = cvlan vid=242
s2_rx42:actions = mip s2n2-i5-21 5, send iface_21
