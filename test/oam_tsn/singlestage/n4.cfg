[interfaces]
nni_24 = eth iface=eth42 # s1_in_24, s3_in_24 , s2_out
nni_34 = eth iface=eth43 # s1_in_34, s3_in_34, s2_out
nni_24:streams = rx124 rx324
nni_34:streams = rx134 rx334
uni = eth iface=eth0
uni:streams = s2

cmd0 = oam_cmd ;ip=10.0.0.4 port=8000
oam0 = oam ip=10.0.0.4 port=6634

[objects]
pef4 = SeqRcvy
prf4 = Replicate
seqgen4 = SeqGen

[oam]
oam2 = ping s2n4-e5-04 s2n1-e5-10 5 -r

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
rx124:packet = eth, cvlan, rtag
rx134:packet = eth, cvlan, rtag
rx124:match = cvlan vid=124
rx134:match = cvlan vid=134
rx124:actions = mep-stop s1n4-e3-24 3, mip s1n4-i4-24 4, jump rx
rx134:actions = mip s1n4-i4-34 4, jump rx
rx = readseq rtag, pef4 rx_cont
rx_cont = mep-stop s1n4-e4-40 4 pef4, del rtag, del cvlan, send uni

s2:packet = eth, cvlan
s2:match = cvlan vid=2
s2:actions = seqgen4, after cvlan add rtag, writeseq rtag, mep-start s2n4-e5-04 5 prf4, prf4 tx242 tx243
tx242 = edit cvlan.vid=242, send nni_24
tx243 = edit cvlan.vid=243, send nni_34

rx324:packet = eth, cvlan, rtag
rx334:packet = eth, cvlan, rtag
rx324:match = cvlan vid=313
rx334:match = cvlan vid=313
rx324:actions = mep-stop s3n4-e1-24 1, mip s3n4-i4-24 4, jump s3rx
rx334:actions = mip s3n4-i4-34 4, jump s3rx
s3rx = readseq rtag, pef4 s3rx_cont
s3rx_cont = mep-stop s3n4-e4-40 4 pef4, del rtag, del cvlan, send uni
