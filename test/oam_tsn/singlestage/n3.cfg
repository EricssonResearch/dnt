[interfaces]
iface_31 = eth iface=eth31 # s1_in_13, s3_in_13
iface_32 = eth iface=eth32 # s1_in_23, s3_out_32
iface_31:streams = rx113 rx313
iface_32:streams = rx123
iface_34 = eth iface=eth34 # s3_out_34

cmd0 = oam_cmd ;ip=10.0.0.3 port=8000
oam0 = oam ip=10.0.0.3 port=6634

[objects]
pef3 = SeqRcvy
pof3 = Pof BufferSize=10 MaxDelay=1000 TakeAnyTime=5000
repl3 = Replicate

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
rx113:packet = eth, cvlan, rtag
rx123:packet = eth, cvlan, rtag
rx113:match = cvlan vid=113
rx123:match = cvlan vid=123
rx113:actions = mip s1n3-i4-13 4, jump s1rx
rx123:actions = mep-stop s1n3-e3-23 3, mip s1n3-i4-23 4, jump s1rx
s1rx = readseq rtag, pef3 s1rx_cont
s1rx_cont = mip s1n3-i4-34 4 pef3, edit cvlan.vid=134, send iface_34

rx313:packet = eth, cvlan, rtag
rx313:match = cvlan vid=313
rx313:actions = mip s3n3-i4-13 4 repl3, repl3 tx332 tx334
tx332 = mep-start s3n3-e1-32 1, send iface_32
tx334 = send iface_34
