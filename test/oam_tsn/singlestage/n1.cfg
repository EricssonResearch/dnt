[interfaces]
uni = eth iface=eth0
uni:streams = s1 s3
nni_112 = eth iface=eth12
nni_112:streams = s2_m1
nni_113 = eth iface=eth13
nni_113:streams = s2_m2

cmd0 = oam_cmd ;ip=10.0.0.1 port=8000
oam0 = oam ip=10.0.0.1 port=6634
oam1 = oam_eth iface=eth_m

[objects]
seqgen1 = SeqGen
seqgen3 = SeqGen
prf1 = Replicate
pef1 = SeqRcvy

[oam]
oam1 = ping s1n1-e4-01 s1n4-e3-24 3 -r # return if: first in ABC order by oam interface name => oam0
oam3 = ping s3n1-e4-01 s3n4-e4-40 4 -r
# oam5 = ping@oam1 s3n1-e4-01 s3n4-e4-40 4 -r

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
s1:packet = eth, cvlan
s1:match = cvlan vid=0
s1:actions = seqgen1, after cvlan add rtag, writeseq rtag, mep-start s1n1-e4-01 4 prf1, prf1 tx112 tx113
tx112 = mep-start s1n1-e3-12 3, edit cvlan.vid=112, send nni_112
tx113 = edit cvlan.vid=113, send nni_113

s2_m1:packet = eth, cvlan, rtag
s2_m1:match = cvlan vid=242
s2_m2:packet = eth, cvlan, rtag
s2_m2:match = cvlan vid=243

s2_m1:actions = mip s2n1-i5-21 5, jump s2rx
s2_m2:actions = mip s2n1-i5-31 5, jump s2rx
s2rx = readseq rtag, pef1 s2rx_cont
s2rx_cont = mep-stop s2n1-e5-10 5 pef1, del rtag, del cvlan, send uni

s3:packet = eth, cvlan
s3:match = cvlan vid=3
s3:actions = seqgen3, after cvlan add rtag, writeseq rtag, edit cvlan.vid=313, mep-start s3n1-e4-01 4, send  nni_113
