[interfaces]
i1 = internal
i1:streams = Rmatch_match Rmatch_before Rmatch_after Rmatch_missing Rbefore_match Rbefore_before Rbefore_after Rbefore_missing Rafter_match Rafter_before Rafter_after Rafter_missing Rmissing_match Rmissing_before Rmissing_after Rmissing_missing
i2 = internal
i2:streams = Ematch_match2 Ematch_before2 Ematch_after2 Ematch_missing2 Ebefore_match2 Ebefore_before2 Ebefore_after2 Ebefore_missing2 Eafter_match2 Eafter_before2 Eafter_after2 Eafter_missing2 Emissing_match2 Emissing_before2 Emissing_after2 Emissing_missing2
i3 = internal
i3:streams = Ematch_match3 Ematch_before3 Ematch_after3 Ematch_missing3 Ebefore_match3 Ebefore_before3 Ebefore_after3 Ebefore_missing3 Eafter_match3 Eafter_before3 Eafter_after3 Eafter_missing3 Emissing_match3 Emissing_before3 Emissing_after3 Emissing_missing3

cmd0 = oam_cmd

[objects]
G = SeqGen

Rmm = Replicate AutoMIP=3
Rmb = Replicate AutoMIP=3
Rma = Replicate AutoMIP=3
Rmx = Replicate AutoMIP=3
Rbm = Replicate AutoMIP=3
Rbb = Replicate AutoMIP=3
Rba = Replicate AutoMIP=3
Rbx = Replicate AutoMIP=3
Ram = Replicate AutoMIP=3
Rab = Replicate AutoMIP=3
Raa = Replicate AutoMIP=3
Rax = Replicate AutoMIP=3
Rxm = Replicate AutoMIP=3
Rxb = Replicate AutoMIP=3
Rxa = Replicate AutoMIP=3
Rxx = Replicate AutoMIP=3

Emm = SeqRcvy AutoMIP=4
Emb = SeqRcvy AutoMIP=4
Ema = SeqRcvy AutoMIP=4
Emx = SeqRcvy AutoMIP=4
Ebm = SeqRcvy AutoMIP=4
Ebb = SeqRcvy AutoMIP=4
Eba = SeqRcvy AutoMIP=4
Ebx = SeqRcvy AutoMIP=4
