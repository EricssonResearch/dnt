Eaa = SeqRcvy AutoMIP=4
Eax = SeqRcvy AutoMIP=4
Exm = SeqRcvy AutoMIP=4
Exb = SeqRcvy AutoMIP=4
Exa = SeqRcvy AutoMIP=4
Exx = SeqRcvy AutoMIP=4

[streams]
;;; replicate tests i1 -> {i2 i3}

; mac in match, vlan in match
Rmatch_match:packet = eth, cvlan
Rmatch_match:match = eth dmac=a:b:c:d:e:f, cvlan vid=22
Rmatch_match:actions = G, Rmm repl_mm1 repl_mm2
repl_mm1 = send i2
repl_mm2 = send i3
repl_editmac1 = edit eth.dmac=a:b:c:d:e:2, send i2
; mac in match, vlan edit before
Rmatch_before:packet = eth, cvlan
Rmatch_before:match = eth dmac=a:b:c:d:e:f
Rmatch_before:actions = edit cvlan.vid=33, G, Rmb repl_mb1 repl_mb2
repl_mb1 = send i2
repl_mb2 = send i3
; mac in match, vlan edit after
Rmatch_after:packet = eth, cvlan
Rmatch_after:match = eth dmac=a:b:c:d:e:f
Rmatch_after:actions = G, Rma repl_ma1 repl_ma2
repl_ma1 = edit cvlan.vid=31, send i2
repl_ma2 = edit cvlan.vid=32, send i3
; mac in match, vlan missing
Rmatch_missing:packet = eth, cvlan
Rmatch_missing:match = eth dmac=a:b:c:d:e:f
Rmatch_missing:actions = G, Rmx repl_mx1 repl_mx2
repl_mx1 = send i2
repl_mx2 = send i3

; mac edit before, vlan in match
Rbefore_match:packet = eth, cvlan
Rbefore_match:match = cvlan vid=22
Rbefore_match:actions = G, edit eth.dmac=a:b:c:d:e:2, Rbm repl_bm1 repl_bm2
repl_bm1 = send i2
repl_bm2:masked = send i3
; mac edit before, vlan edit before
Rbefore_before:packet = eth, cvlan
Rbefore_before:match = cvlan dei=1
Rbefore_before:actions = G, edit eth.dmac=a:b:c:d:e:2 cvlan.vid=34, Rbb repl_bb1 repl_bb2
repl_bb1 = send i2
repl_bb2 = send i3
; mac edit before, vlan edit after
Rbefore_after:packet = eth, cvlan
Rbefore_after:match = cvlan dei=1
Rbefore_after:actions = G, edit eth.dmac=a:b:c:d:e:2, Rba repl_ba1 repl_ba2
repl_ba1:masked = edit cvlan.vlan=0x4114, send i2
repl_ba2 = edit cvlan.vlan=0x4224, send i3
; mac edit before, vlan missing
Rbefore_missing:packet = eth, cvlan
Rbefore_missing:match = cvlan dei=1
Rbefore_missing:actions = G, edit eth.dmac=a:b:c:d:e:2, Rbx repl_bx1 repl_bx2
repl_bx1 = send i2
repl_bx2 = send i3

; mac edit after, vlan in match
Rafter_match:packet = eth, cvlan
Rafter_match:match = cvlan vlan=12345
Rafter_match:actions = G, Ram repl_am1 repl_am2
repl_am1 = edit eth.dmac=a:b:c:d:e:7, send i2
repl_am2 = edit eth.dmac=a:b:c:d:e:8, send i3
; mac edit after, vlan edit before
Rafter_before:packet = eth, cvlan
Rafter_before:match = cvlan dei=1
Rafter_before:actions = G, edit cvlan.vlan=0x1234, Rab repl_ab1 repl_ab2
repl_ab1 = edit eth.dmac=a:b:c:d:e:7, send i2
repl_ab2:masked = edit eth.dmac=a:b:c:d:e:8, send i3
; mac edit after, vlan edit after
Rafter_after:packet = eth, cvlan
Rafter_after:match = cvlan dei=1
Rafter_after:actions = G, Raa repl_aa1 repl_aa2
repl_aa1:masked = edit eth.dmac=a:b:c:d:e:7 cvlan.vlan=12345, send i2
repl_aa2 = edit eth.dmac=a:b:c:d:e:8 cvlan.vlan=12341, send i3
; mac edit after, vlan missing
Rafter_missing:packet = eth, cvlan
Rafter_missing:match = cvlan dei=1
Rafter_missing:actions = G, Rax repl_ax1 repl_ax2
repl_ax1 = edit eth.dmac=a:b:c:d:e:7, send i2
repl_ax2 = edit eth.dmac=a:b:c:d:e:8, send i3

; mac missing, vlan in match
Rmissing_match:packet = eth, cvlan
Rmissing_match:match = cvlan vlan=12345
Rmissing_match:actions = G, Rxm repl_xm1 repl_xm2
repl_xm1 = send i2
repl_xm2 = send i3
; mac missing, vlan edit before
Rmissing_before:packet = eth, cvlan
Rmissing_before:match = cvlan dei=1
Rmissing_before:actions = G, edit cvlan.vlan=0x1234, Rxb repl_xb1 repl_xb2
repl_xb1 = send i2
repl_xb2 = send i3
; mac missing, vlan edit after
Rmissing_after:packet = eth, cvlan
Rmissing_after:match = cvlan dei=1
Rmissing_after:actions = G, Rxa repl_xa1 repl_xa2
repl_xa1 = edit cvlan.vlan=0x4114, send i2
repl_xa2 = edit cvlan.vlan=0x4334, send i3
; mac missing, vlan missing
Rmissing_missing:packet = eth, cvlan
Rmissing_missing:match = cvlan dei=1
Rmissing_missing:actions = G, Rxx repl_xx1 repl_xx2
repl_xx1 = send i2
repl_xx2 = send i3


