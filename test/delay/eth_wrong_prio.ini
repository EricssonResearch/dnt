[interfaces]
uni = eth iface=swp2
uni:streams = stream_uni
nni1 = eth iface=swp0
nni1:streams = stream_nni1

[streams]
stream_uni:packet = eth, cvlan
stream_uni:match = cvlan vid=0
stream_uni:actions = edit cvlan.vid=100, edit cvlan.pcp=0, delay 400 offload, send nni1

stream_nni1:packet = eth, cvlan
stream_nni1:match = cvlan vid=100
stream_nni1:actions = del cvlan, send uni

