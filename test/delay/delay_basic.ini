
[interfaces]

if1 = eth iface=eno1
if1:streams = s1
if2 = eth iface=ep2
if2:streams = s2

[objects]

sgen1 = SeqGen
srcvy1 = SeqRcvy

[streams]

s1:packet = eth, cvlan          ; now we can have comments at the end
s1:match = cvlan vid=0       # both start characters are supported
s1:actions = send if2

s2:packet = eth, cvlan
s2:match = cvlan vid=0
s2:actions = after cvlan add ttag, writetstamp ttag, send if1, readtstamp ttag, delay 300, send if1
