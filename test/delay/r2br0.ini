
[interfaces]

uni = eth iface=r2br0_uni
uni:streams = suni
nni0 = eth iface=r2br0_nni0
nni0:streams = snni
nni1 = eth iface=r2br0_nni1
nni1:streams = snni

[objects]

gen_nni = SeqGen InitSeqStart=0
rcvy_nni = SeqRcvy

[streams]

suni:packet = eth, cvlan
suni:match = cvlan vid=0
suni:actions = after cvlan add ttag, edit cvlan.vid=100, writetstamp ttag, send nni0

snni:packet = eth, cvlan, ttag
snni:match = cvlan vid=200
snni:actions = readtstamp ttag, delay 100, del ttag, del cvlan, send uni
