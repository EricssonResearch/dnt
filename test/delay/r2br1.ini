
[interfaces]

uni = eth iface=r2br1_uni
uni:streams = suni
nni0 = eth iface=r2br1_nni0
nni0:streams = snni
nni1 = eth iface=r2br1_nni1
nni1:streams = snni

[objects]

gen_nni = SeqGen InitSeqStart=0
rcvy_nni = SeqRcvy frerSeqRcvyResetMsec=1000 frerSeqRcvyHistoryLength=100

[streams]

suni:packet = eth, cvlan
suni:match = cvlan vid=0
suni:actions = after cvlan add ttag, edit cvlan.vid=200, writetstamp ttag, send nni0

snni:packet = eth, cvlan, ttag
snni:match = cvlan vid=100
snni:actions = readtstamp ttag, delay 100, del ttag, del cvlan, send uni
