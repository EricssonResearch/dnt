[interfaces]
uni = eth iface=beth0
uni:streams = suni
nni0 = eth iface=enp4s0
nni0:streams = snni
nni1 = eth iface=enp7s0
nni1:streams = snni

[objects]
Repl = Replicate
Gen = SeqGen InitSeqStart=0
Elim = SeqRcvy

[streams]
suni:packet = eth, cvlan
suni:match = cvlan vid=10
suni:actions = Gen, after cvlan add rtag, writeseq rtag, edit cvlan.vid=100, writeseq rtag, Repl to_nni0 to_nni1

to_nni0 = send nni0
to_nni1 = send nni1

snni:packet = eth, cvlan, rtag
snni:match = cvlan vid=100
snni:actions = readseq rtag, Elim Elim-compound 

Elim-compound = del rtag, edit cvlan.vid=10, send uni