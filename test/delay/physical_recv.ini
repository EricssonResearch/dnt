[interfaces]
uni = eth iface=beth0
uni:streams = suni
nni0 = eth iface=enp4s0
nni0:streams = snni
nni1 = eth iface=enp7s0
nni1:streams = snni

[objects]
gen_nni = SeqGen InitSeqStart=0
rcvy_nni = SeqRcvy

[streams]
suni:packet = eth, cvlan
suni:match = cvlan vid=10
suni:actions = gen_nni, after cvlan add rtag, edit cvlan.vid=100, writeseq rtag, replicate to_nni0 to_nni1

to_nni0 = send nni0
to_nni1 = send nni1

snni:packet = eth, cvlan, rtag
snni:match = cvlan vid=100
snni:actions = readseq rtag, rcvy_nni, del rtag, edit cvlan.vid=10, send uni
