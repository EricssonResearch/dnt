[interfaces]
uni = eth iface=swp2
uni:streams = stream_uni
nni1_in = udp-in iface=swp0 ipv=4
nni1_in:streams = stream_nni
nni1_out = udp-out iface=swp0 dstip=192.168.55.2 prio=1

[streams]
stream_uni:packet = eth, cvlan
stream_uni:match = cvlan vid=0
stream_uni:actions = edit cvlan.vid=99, delay 400 offload, send nni1_out

stream_nni:packet = eth, cvlan
stream_nni:match = cvlan vid=99
stream_nni:actions = del cvlan, send uni