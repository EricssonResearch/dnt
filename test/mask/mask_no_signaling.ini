[interfaces]
uni = udp-in iface=lo port=5555
uni:streams = from_uni
nni = internal
nni:streams = C

cmd = oam_cmd
oam0 = oam ip=127.0.0.1 port=6666

notif = udp-out iface=lo dstip=127.0.0.1 dstport=9000

[objects]
R1 = Replicate
R2 = Replicate
E1 = SeqRcvy AutoMIP=3 frerSeqRcvyLatentErrorPaths=2 frerSeqRcvyResetMSec=500 frerSeqRcvyLatentErrorPeriod=200 frerSeqRcvyLatentErrorDifference=3 frerSeqRcvyOutageThreshold=4 frerSeqRcvyLatentResetPeriod=300
E2 = SeqRcvy AutoMIP=3 frerSeqRcvyLatentErrorPaths=3 frerSeqRcvyResetMSec=500 frerSeqRcvyLatentErrorPeriod=200 frerSeqRcvyLatentErrorDifference=3 frerSeqRcvyOutageThreshold=4 frerSeqRcvyLatentResetPeriod=300
G = SeqGen
O = Pof

[streams]
from_uni:packet = mpls
from_uni:match = mpls label=0
from_uni:actions = G, after mpls add dcw, edit mpls.label=1 mpls.bos=1 mpls.ttl=63, ttlreduce mpls, writeseq dcw, send nni


C:packet = mpls, dcw
C:match = mpls label=1
; C:actions = G, R1 M1 M2 M3
C:actions = readseq dcw, R1 M1 M2 M3

; R1 streams
M1 = readseq dcw, R2 M4 M5
M2 = readseq dcw, E2 End
M3 = readseq dcw, E1 M6

; R2 streams
M4 = readseq dcw, E2 End
M5 = readseq dcw, E1 M6

M6 = readseq dcw, E2 End
End = readseq dcw, O, drop

; Notifications
notification_session = send notif
