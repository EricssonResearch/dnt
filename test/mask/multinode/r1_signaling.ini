[interfaces]
uni = udp-in iface=lo port=5555
uni:streams = from_uni
to-r2 = udp-out iface=r1r2 dstip=1.0.0.2
to-e2 = udp-out iface=r1e2 dstip=2.0.0.4
to-e1 = udp-out iface=r1e1 dstip=3.0.0.3

cmd = oam_cmd
oam0 = oam ip=127.0.0.1 port=6666

[objects]
R1 = Replicate AutoMIP=3
G = SeqGen

[streams]
from_uni:packet = mpls, dcw
from_uni:match = mpls label=0
from_uni:actions = G, edit mpls.bos=1 mpls.ttl=63, ttlreduce mpls, writeseq dcw, R1 M1 M2 M3

; R1 streams
M1 = edit mpls.label=11, send to-r2
M2 = edit mpls.label=12, send to-e2
M3 = edit mpls.label=13, send to-e1
