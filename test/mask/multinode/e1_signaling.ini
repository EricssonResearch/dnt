[interfaces]
M5in = udp-in iface=e1r2
M5in:streams = M5in
M3in = udp-in iface=e1r1
M3in:streams = M3in
to-e2 = udp-out iface=e1e2 dstip=6.0.0.4

cmd = oam_cmd
oam0 = oam ip=127.0.0.1 port=6666

[objects]
E1 = SeqRcvy AutoMIP=3 frerSeqRcvyLatentErrorPaths=2 frerSeqRcvyResetMSec=500 frerSeqRcvyLatentErrorPeriod=200 frerSeqRcvyLatentErrorDifference=3 frerSeqRcvyOutageThreshold=4 frerSeqRcvyLatentResetPeriod=300

[streams]
M5in:packet = mpls, dcw
M5in:match = mpls label=25
M5in:actions = readseq dcw, E1 M6

M3in:packet = mpls, dcw
M3in:match = mpls label=13
M3in:actions = readseq dcw, E1 M6

M6 = edit mpls.label=16, send to-e2
