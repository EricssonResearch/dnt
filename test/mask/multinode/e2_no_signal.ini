[interfaces]
M4in = udp-in iface=e2r2
M4in:streams = M4in
M2in = udp-in iface=e2r1
M2in:streams = M2in
M6in = udp-in iface=e2e1
M6in:streams = M6in

cmd = oam_cmd
oam0 = oam ip=127.0.0.1 port=6666

[objects]
E2 = SeqRcvy AutoMIP=3 frerSeqRcvyLatentErrorPaths=3 frerSeqRcvyResetMSec=500 frerSeqRcvyLatentErrorPeriod=200 frerSeqRcvyLatentErrorDifference=3 frerSeqRcvyOutageThreshold=4 frerSeqRcvyLatentResetPeriod=300
O = Pof

[streams]
M4in:packet = mpls, dcw
M4in:match = mpls label=24
M4in:actions = readseq dcw, E2 End

M2in:packet = mpls, dcw
M2in:match = mpls label=12
M2in:actions = readseq dcw, E2 End

M6in:packet = mpls, dcw
M6in:match = mpls label=16
M6in:actions = readseq dcw, E2 End

End = O, drop
