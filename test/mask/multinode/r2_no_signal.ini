[interfaces]
M1in = udp-in iface=r2r1
M1in:streams = M1in
to-e1 = udp-out iface=r2e1 dstip=5.0.0.3
to-e2 = udp-out iface=r2e2 dstip=4.0.0.4

cmd = oam_cmd
oam0 = oam ip=127.0.0.1 port=6666

[objects]
R2 = Replicate

[streams]
M1in:packet = mpls, dcw
M1in:match = mpls label=11
M1in:actions = R2 M4 M5

; R2 streams
M4 = edit mpls.label=24, send to-e2
M5 = edit mpls.label=25, send to-e1
