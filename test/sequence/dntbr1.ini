
[interfaces]

uni = eth iface=dntbr1_uni
uni:streams = suni
nni0 = eth iface=dntbr1_nni0
nni0:streams = snni
nni1 = eth iface=dntbr1_nni1
nni1:streams = snni

cmd0 = oam_cmd port=8001;ip=10.0.0.2 port=8000
oam0 = oam ip=127.0.0.1

[objects]

gen_nni = SeqGen InitSeqStart=0
rcvy_nni = SeqRcvy frerSeqRcvyLatentErrorPaths=2 frerSeqRcvyResetMSec=5000 frerSeqRcvyLatentErrorPeriod=2000 frerSeqRcvyLatentErrorDifference=3 frerSeqRcvyOutageThreshold=6 frerSeqRcvyLatentResetPeriod=3000

[streams]

suni:packet = eth, cvlan
suni:match = cvlan vid=0
suni:actions = gen_nni, after cvlan add rtag, edit cvlan.vid=200, writeseq rtag, replicate to_nni0 to_nni1

to_nni0 = send nni0
to_nni1 = send nni1

snni:packet = eth, cvlan, rtag
snni:match = cvlan vid=100
snni:actions = readseq rtag, rcvy_nni nni_actions
nni_actions = del rtag, del cvlan, send uni
