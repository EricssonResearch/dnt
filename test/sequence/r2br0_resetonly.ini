
[interfaces]

uni = eth iface=r2br0_uni
uni:streams = suni
nni0 = eth iface=r2br0_nni0
nni0:streams = snni
nni1 = eth iface=r2br0_nni1
nni1:streams = snni

[objects]

gen_nni = SeqGen InitSeqStart=65526 InitSeqFlag=false ResetFlag=true
rcvy_nni = SeqRcvy InitSeqFlag=false ResetFlag=true frerSeqRcvyAlgorithm=SeamlessVector frerSeqRcvyHistoryLength=3

[streams]

suni:packet = eth, cvlan
suni:match = cvlan vid=0
suni:actions = gen_nni, after cvlan add rtag, edit cvlan.vid=100, writeseq rtag, replicate to_nni0 to_nni1

to_nni0 = send nni0
to_nni1 = send nni1

snni:packet = eth, cvlan, rtag
snni:match = cvlan vid=200
snni:actions = readseq rtag, rcvy_nni nni_actions
nni_actions = del rtag, del cvlan, send uni
