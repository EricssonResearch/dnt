[interfaces]

if1 = eth iface=veth1
if1:streams = s1 s2
if2 = ip iface=eth_r2t1
if3 = ip iface=vrf1
if3:streams = s3 s4 s5 s6

[objects]

sgen1 = SeqGen InitSeqFlag=false ResetFlag=false
sgen2 = SeqGen InitSeqStart=65526 InitSeqFlag=true ResetFlag=true
pef1 = SeqRcvy InitSeqFlag=false ResetFlag=false frerSeqRcvyAlgorithm=SeamlessVector frerSeqRcvyHistoryLength=512
pef2 = SeqRcvy InitSeqFlag=true ResetFlag=true frerSeqRcvyAlgorithm=SeamlessVector frerSeqRcvyHistoryLength=512


[streams]

s1:packet = eth, cvlan, ipv6                         ; incoming packets from talker t1, background
s1:match = ipv6 dst=fd05:a1fa::5 class=0x0           ; match IPv6 DST & class (DSCP 0)
s1:actions = sgen1, before ipv6 add ipv6_sid hoplimit=32 loc=0xfd00be1a00000004, writeseq ipv6_sid, del eth, del cvlan, replicate member11 member12
member11 = edit ipv6_sid.func=0 ipv6_sid.flow=0x11111, send if3
member12 = edit ipv6_sid.func=1 ipv6_sid.flow=0x12222, send if3

s2:packet = eth, cvlan, ipv6                         ; incoming packets from talker t1, detnet
s2:match = ipv6 dst=fd05:a1fa::5 class=0xc0          ; match IPv6 DST & class (DSCP 6)
s2:actions = sgen2, before ipv6 add ipv6_sid hoplimit=32 loc=0xfd00be1a00000004, writeseq ipv6_sid, del eth, del cvlan, replicate member21 member22
member21 = edit ipv6_sid.func=0 ipv6_sid.flow=0x23333, send if3
member22 = edit ipv6_sid.func=1 ipv6_sid.flow=0x24444, send if3


s3:packet = ipv6_sid, ipv6
s3:match = ipv6_sid loc=0xfd00be1a00000002 flow=0x15555        ; match Locator 64 bit, both functions
s3:actions = readseq ipv6_sid, del ipv6_sid, pef1 send_uni
s4:packet = ipv6_sid, ipv6
s4:match = ipv6_sid loc=0xfd00be1a00000002 flow=0x16666        ; match Locator 64 bit, both functions
s4:actions = readseq ipv6_sid, del ipv6_sid, pef1 send_uni

s5:packet = ipv6_sid, ipv6
s5:match = ipv6_sid loc=0xfd00be1a00000002 flow=0x27777        ; match Locator 64 bit, both functions
s5:actions = readseq ipv6_sid, del ipv6_sid, pef2 send_uni
s6:packet = ipv6_sid, ipv6
s6:match = ipv6_sid loc=0xfd00be1a00000002 flow=0x28888        ; match Locator 64 bit, both functions
s6:actions = readseq ipv6_sid, del ipv6_sid, pef2 send_uni

send_uni = send if2
