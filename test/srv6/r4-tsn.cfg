[interfaces]

if1 = eth iface=eth_r4l5
if1:streams = s1 s2
#if2 = ip iface=eth_r4l5
if3 = ip iface=vrf1
if4 = ip iface=ve2
if4:streams = s3 s4 s5 s6

cmd0 = oam_cmd port=8002
oam0 = oam ip=fd14:fade::4 port=6634

[objects]

sgen1 = SeqGen InitSeqFlag=false ResetFlag=false
sgen2 = SeqGen InitSeqStart=65526 InitSeqFlag=true ResetFlag=true
pef1 = SeqRcvy InitSeqFlag=false ResetFlag=false frerSeqRcvyAlgorithm=SeamlessVector frerSeqRcvyHistoryLength=512
pef2 = SeqRcvy InitSeqFlag=true ResetFlag=true frerSeqRcvyAlgorithm=SeamlessVector frerSeqRcvyHistoryLength=512
prf1 = Replicate
prf2 = Replicate

[streams]

s1:packet = eth, cvlan, ipv4                         ; incoming packets from talker t1, background
s1:match = cvlan vid=10 pcp=0                        ; match cvlan 10 & pcp 0
s1:actions = sgen1, before eth add ipv6_outer hoplimit=32 loc=0xfd00a2d200000002, mip s1r4-bkg 4 prf1, writeseq ipv6_outer, prf1 member11 member12
member11 = edit ipv6_outer.func=1 ipv6_outer.flowid=0x15555, send if3
member12 = edit ipv6_outer.func=2 ipv6_outer.flowid=0x16666, send if3

s2:packet = eth, cvlan, ipv4                         ; incoming packets from talker t1, detnet
s2:match = cvlan vid=10 pcp=6                        ; match cvlan 10 & pcp 6
s2:actions = sgen2, before eth add ipv6_outer hoplimit=32 loc=0xfd00a2d200000002, mip s2r4-det 4 prf2, writeseq ipv6_outer, prf2 member21 member22
member21 = edit ipv6_outer.func=1 ipv6_outer.flowid=0x27777, send if3
member22 = edit ipv6_outer.func=2 ipv6_outer.flowid=0x28888, send if3


s3:packet = ipv6_outer, eth
s3:match = ipv6_outer flowid=0x11111        ; match Locator 64 bit, both functions
s3:actions = readseq ipv6_outer, mep-stop s1r4-bkg1 4 pef1, del ipv6_outer, pef1 send_uni1
s4:packet = ipv6_outer, eth
s4:match = ipv6_outer flowid=0x12222        ; match Locator 64 bit, both functions
s4:actions = readseq ipv6_outer, mep-stop s2r4-det1 4 pef1, del ipv6_outer, pef1 send_uni1
send_uni1 = send if1

s5:packet = ipv6_outer, eth
s5:match = ipv6_outer flowid=0x23333        ; match Locator 64 bit, both functions
s5:actions = readseq ipv6_outer, mep-stop s1r4-bkg2 4 pef2, del ipv6_outer, pef2 send_uni2
s6:packet = ipv6_outer, eth
s6:match = ipv6_outer flowid=0x24444        ; match Locator 64 bit, both functions
s6:actions = readseq ipv6_outer, mep-stop s2r4-det2 4 pef2, del ipv6_outer, pef2 send_uni2
send_uni2 = send if1
