
[interfaces]

if1 = ip iface=eth_r3l1
if1:streams = s1
if2 = ip iface=loop1
if2:streams = s2

[objects]

sgen1 = SeqGen
srcvy1 = SeqRcvy

[streams]

s1:packet = ipv6              ; incoming packets from listener l1
s1:match = ipv6 dst=fd01::1   ; match IPv6 DST
s1:actions = sgen1, before ipv6 add ipv6_sid, edit ipv6_sid.hoplimit=32 ipv6_sid.loc=0xfcff0000000002 ipv6_sid.func=0, send if2

s2:packet = ipv6_sid, ipv6
s2:match = ipv6_sid loc=0xfcff0000000001        ; match Locator
s2:actions = del ipv6_sid, send if1
