[interfaces]
srv6_in = ip iface=ve2
srv6_in:streams = rx12
srv6_out = ip iface=vrf1      ; common out iface for all srv6 tunnels

cmd0 = oam_cmd port=8000
oam0 = oam ip=fd12:fade::0 port=6634

[objects]
prf2 = Replicate

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]

rx12:packet = ipv6_outer, ipv6
rx12:match = ipv6_outer flowid=0x11111        ; match Locator 64 bit, both functions
rx12:actions = readseq ipv6_outer, mip s1n2-i3-12 3 prf2, prf2 tx123 tx124
tx123 = edit ipv6_outer.loc=0xfd00a2d200000004 ipv6_outer.func=1 ipv6_outer.flowid=0x11211, send srv6_out
tx124 = edit ipv6_outer.loc=0xfd00a2d200000003 ipv6_outer.func=1 ipv6_outer.flowid=0x11311, send srv6_out
