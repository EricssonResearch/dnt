[interfaces]
srv6_in = ip iface=ve2
srv6_in:streams = rx113 rx123 rx313
srv6_out = ip iface=vrf1      ; common out iface for all srv6 tunnels

cmd0 = oam_cmd port=8000
oam0 = oam ip=fd13:fade::0 port=6634

[objects]
pef3 = SeqRcvy
pof3 = Pof BufferSize=10 MaxDelay=1000 TakeAnyTime=5000
repl3 = Replicate

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
rx113:packet = ipv6_outer, ipv6
rx113:match = ipv6_outer flowid=0x12111        ; match Locator 64 bit, both functions
rx113:actions = readseq ipv6_outer, mip s1n3-i4-13 4, jump s1rx
rx123:packet = ipv6_outer, ipv6
rx123:match = ipv6_outer flowid=0x11311        ; match Locator 64 bit, both functions
rx123:actions = readseq ipv6_outer, mep-stop s1n3-e3-23 3, mip s1n3-i4-23 4, jump s1rx
s1rx = pef3 s1rx_cont
s1rx_cont = mip s1n3-i4-34 4 pef3, edit ipv6_outer.loc=0xfd00a2d200000004 ipv6_outer.func=1 ipv6_outer.flowid=0x11131, send srv6_out

rx313:packet = ipv6_outer, ipv6
rx313:match = ipv6_outer flowid=0x31111        ; match Locator 64 bit, both functions
rx313:actions = mip s3n3-i4-13 4 repl3, repl3 tx332 tx334
tx332 = mep-start s3n3-e1-32 1, edit ipv6_outer.loc=0xfd00a2d200000004 ipv6_outer.func=1 ipv6_outer.flowid=0x31211, send srv6_out
tx334 = edit ipv6_outer.loc=0xfd00a2d200000004 ipv6_outer.func=1 ipv6_outer.flowid=0x31311, send srv6_out
