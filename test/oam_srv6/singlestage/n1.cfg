[interfaces]
uni = eth iface=veth1
uni:streams = s1 s3
uni_out = ip iface=eth0       ; out iface for UNI streams

srv6_in = ip iface=ve2
srv6_in:streams = rx242 rx243
srv6_out = ip iface=vrf1      ; common out iface for all srv6 tunnels

cmd0 = oam_cmd port=8000
oam0 = oam ip=fd11:fade::0 port=6634
#oam0 = oam ip=fd11:fade:: port=6634

[objects]
seqgen1 = SeqGen
seqgen3 = SeqGen
prf1 = Replicate
pef1 = SeqRcvy

[oam]
oam1 = ping s1n1-e4-01 s1n4-e3-24 3 -r
oam3 = ping s3n1-e4-01 s3n4-e4-40 4 -r

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
s1:packet = eth, cvlan, ipv6
#s1:match = cvlan vid=0
s1:match = ipv6 dst=fd07:a1fa::e class=0x0           ; match IPv6 DST & class (DSCP 0)
#s1:actions = seqgen1, before ipv6 add ipv6_outer loc=0xfd00a2d200000000 hoplimit=5, del eth, del cvlan, mep-start s1n1-e4-01 4 prf1, writeseq ipv6_outer, prf1 tx112 tx113
s1:actions = seqgen1, before ipv6 add ipv6_outer loc=0xfd00a2d200000000 hoplimit=5, del eth, del cvlan, mep-start s1n1-e4-01 4 prf1, prf1 tx112 tx113
tx112 = edit ipv6_outer.loc=0xfd00a2d200000002 ipv6_outer.func=1 ipv6_outer.flowid=0x11111, writeseq ipv6_outer, send srv6_out
tx113 = edit ipv6_outer.loc=0xfd00a2d200000003 ipv6_outer.func=1 ipv6_outer.flowid=0x12111, writeseq ipv6_outer, send srv6_out

rx242:packet = ipv6_outer, ipv6
rx242:match = ipv6_outer flowid=0x21111        ; match Locator 64 bit, both functions
rx242:actions = readseq ipv6_outer, mip s2n1-i5-21 5, jump s2rx
rx243:packet = ipv6_outer, ipv6
rx243:match = ipv6_outer flowid=0x22222        ; match Locator 64 bit, both functions
rx243:actions = readseq ipv6_outer, mip s2n1-i5-31 5, jump s2rx
s2rx = pef1 s2rx_cont
s2rx_cont = mep-stop s2n1-e5-10 5 pef1, del ipv6_outer, send uni_out
#s2rx_cont = del ipv6_outer, send uni_out

s3:packet = eth, cvlan, ipv6
#s3:match = cvlan vid=3
s3:match = ipv6 dst=fd05:a1fa::5 class=0xc0          ; match IPv6 DST & class (DSCP 6)
s3:actions = seqgen3, before ipv6 add ipv6_outer hoplimit=32 loc=0xfd00a2d200000003, del eth, del cvlan, mep-start s3n1-e4-01 4, writeseq ipv6_outer, edit ipv6_outer.func=1 ipv6_outer.flowid=0x31111, send srv6_out
