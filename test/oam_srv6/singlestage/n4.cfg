[interfaces]
uni = eth iface=veth1
uni:streams = s2
uni_out = ip iface=eth0       ; out iface for UNI streams

srv6_in = ip iface=ve2
srv6_in:streams = rx124 rx134 rx324 rx334
srv6_out = ip iface=vrf1      ; common out iface for all srv6 tunnels

cmd0 = oam_cmd port=8000
oam0 = oam ip=fd14:fade::4 port=6634

[objects]
pef4 = SeqRcvy
prf4 = Replicate
seqgen4 = SeqGen

[oam]
#oam2 = ping s2n4-e5-04 s2n1-e5-10 5 -r

# label=<stream num><node from><destination node>
# e.g. 113 = stream s1, node1 --> node3
[streams]
rx124:packet = ipv6_outer, ipv6
rx134:packet = ipv6_outer, ipv6
rx124:match = ipv6_outer flowid=0x11211        ; match Locator 64 bit, both functions
rx134:match = ipv6_outer flowid=0x11131        ; match Locator 64 bit, both functions
rx124:actions = mep-stop s1n4-e3-24 3, mip s1n4-i4-24 4, jump rx
rx134:actions = mip s1n4-i4-34 4, jump rx
rx = readseq ipv6_outer, pef4 rx_cont
rx_cont = edit ipv6_outer.loc=0xfd00a2d200000004, mep-stop s1n4-e4-40 4 pef4, del ipv6_outer, send uni_out

s2:packet = eth, cvlan, ipv6
#s2:match = cvlan vid=2
s2:match = ipv6 dst=fd01:a1fa::a class=0x0           ; match IPv6 DST & class (DSCP 0)
s2:actions = seqgen4, before ipv6 add ipv6_outer hoplimit=32 loc=0xfd00a2d200000001, del eth, del cvlan, mep-start s2n4-e5-04 5 prf4, writeseq ipv6_outer, prf4 tx242 tx243
tx242 = edit ipv6_outer.func=1 ipv6_outer.flowid=0x21111, send srv6_out
tx243 = edit ipv6_outer.func=2 ipv6_outer.flowid=0x22222, send srv6_out

rx324:packet = ipv6_outer, ipv6
rx334:packet = ipv6_outer, ipv6
rx324:match = ipv6_outer flowid=0x31211        ; match Locator 64 bit, both functions
rx334:match = ipv6_outer flowid=0x31311        ; match Locator 64 bit, both functions
rx324:actions = mep-stop s3n4-e1-24 1, mip s3n4-i4-24 4, jump s3rx
rx334:actions = mip s3n4-i4-34 4, jump s3rx
s3rx = readseq ipv6_outer, pef4 s3rx_cont
s3rx_cont = edit ipv6_outer.loc=0xfd00a2d200000004, mep-stop s3n4-e4-40 4 pef4, del ipv6_outer, send uni_out
