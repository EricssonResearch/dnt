
[interfaces]

ifA = eth iface=ethBA
ifA:streams = sa
ifCout = udp-out iface=ethBC dstip=ipv4 srcport=663
ifCin  = udp-in iface=ethBC ipv=6 senders=10.0.2.3,ifBout
ifCin:streams = su

ifCmd = oam_cmd ;iface=ethBC ip=fd01::2
ifReturn = oam ip=fd02::2

ifNotifyA = udp-out iface=ethBA dstip=fd01::1 dstport=5678
ifNotifyC = udp-out iface=ethBC dstip=10.0.2.3 dstport=5678

[objects]

sgen = SeqGen InitSeqStart=5
P = Pof

[streams]

sa:packet = eth, cvlan
sa:match = cvlan vid=1001
sa:actions = sgen, before eth add dcw_tunnel, edit dcw_tunnel.resv=0x0000, before dcw_tunnel add mpls_tunnel bos=1 ttl=1, mip startB 2, edit mpls_tunnel.label=101, P, send ifCout, some_more
some_more = mep-start startB2 2, edit mpls_tunnel.label=102

su:packet = mpls_tunnel, dcw_tunnel, eth, cvlan_client
su:match = mpls_tunnel label=220
su:actions = del mpls_tunnel, del dcw_tunnel, edit cvlan_client.vid=1001, send ifA

notification_session = send ifNotifyA, send ifNotifyC

[oam]

bgping0 = ping startB any 2 -r
