[interfaces]
uni = eth iface=aeth0
uni:streams = suni
nni0 = eth iface=enp3s0
nni0:streams = snni
nni1 = eth iface=enp6s0
nni1:streams = snni

[objects]
Repl = Replicate
Gen = SeqGen InitSeqStart=0
Elim = SeqRcvy

[streams]
suni:packet = eth, cvlan
suni:match = cvlan vid=10
suni:actions = Gen, after cvlan add rtag, edit cvlan.vid=100, edit cvlan.pcp=1, delay 500 offload, Repl Repl-member1 Repl-member2

Repl-member1 = send nni0
Repl-member2 = send nni1

snni:packet = eth, cvlan, rtag
snni:match = cvlan vid=100
snni:actions = readseq rtag, Elim Elim-compound

Elim-compound = del rtag, edit cvlan.vid=10, send uni
