# send-receive on ip interface

[interfaces]

ifA = ip iface=ethBA
ifA:streams = s14 s16
ifC = ip iface=ethBC
ifC:streams = s24 s26

ifCmd = oam_cmd

# on na: ip r a 10.0.2.0/24 via 10.0.1.2
# on nc: ip r a 10.0.1.0/24 via 10.0.2.2
# on na: ping 10.0.2.3

# on na: ip r a fd02::/64 via fd01::2
# on nc: ip r a fd01::/64 via fd02::2
# on na: ping fd02::3

[streams]

s14:packet = ipv4
s14:match = ipv4 version=4
s14:actions = send ifC

s16:packet = ipv6
s16:match = ipv6 version=6
s16:actions = send ifC

s24:packet = ipv4
s24:match = ipv4 version=4
s24:actions = send ifA

s26:packet = ipv6
s26:match = ipv6 version=6
s26:actions = send ifA
