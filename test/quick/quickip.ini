
[interfaces]

; TODO we can't have both streams at the same time
ifA = eth iface=ethBA
ifA:streams = s14 s16
#ifA:streams = s16
ifC = eth iface=ethBC
ifC:streams = s24 s26
#ifC:streams = s26

ifAi = ip iface=ethBA
ifCi = ip iface=ethBC

ifCmd = oam_cmd

# on na: ip r a 10.0.2.0/24 via 10.0.1.2
# on nc: ip r a 10.0.1.0/24 via 10.0.2.2
# on na: ping 10.0.2.3

# on na: ip r a fd02::/64 via fd01::2
# on nc: ip r a fd01::/64 via fd02::2
# on na: ping fd02::3

[streams]

s14:packet = eth, cvlan, ipv4
s14:match = cvlan vid=0
s14:actions = del eth, del cvlan, send ifCi

s16:packet = eth, cvlan, ipv6
s16:match = cvlan vid=0
s16:actions = del eth, del cvlan, send ifCi

s24:packet = eth, cvlan, ipv4
s24:match = cvlan vid=0
s24:actions = del eth, del cvlan, send ifAi

s26:packet = eth, cvlan, ipv6
s26:match = cvlan vid=0
s26:actions = del eth, del cvlan, send ifAi
