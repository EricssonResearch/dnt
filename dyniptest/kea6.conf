{
    "Dhcp6": {
        "valid-lifetime": 10,
        "renew-timer": 10,
        "rebind-timer": 10,
        "preferred-lifetime": 20,

        "interfaces-config": {
            "interfaces": [ "ethCD" ]
        },

        "lease-database": {
            "type": "memfile",
            "persist": false,
            "name": "/var/lib/kea/dhcp6.leases"
        },

        "subnet6": [
            {
                "id": 1,
                "subnet": "fd03::/64",
                // this is needed but it's not mentioned in the documentation
                "interface": "ethCD",
                "pools": [
                    {
                        "pool": "fd03::10 - fd03::30"
                    }
                ]
            }
        ]
    }
}
