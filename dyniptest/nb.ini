[ interfaces ]

uni = ip iface=ethBA

nni4_out = udp-out iface=ethBC dstip=ipv4
nni4_in = udp-in iface=ethBC ipv=4
nni6_out = udp-out iface=ethBC dstip=ipv6
nni6_in = udp-in iface=ethBC ipv=6

uni:streams = in4 in6
nni4_in:streams = tun4
nni6_in:streams = tun6

ifCmd = oam_cmd
ifReturn4 = oam ip=10.0.2.2
ifReturn6 = oam ip=fd02::2

[ objects ]

seqgen4 = SeqGen
seqgen6 = SeqGen

secrcvy4 = SeqRcvy frerSeqRcvyHistoryLength=16
secrcvy6 = SeqRcvy frerSeqRcvyHistoryLength=16

[ streams ]

in4:packet = ipv4
in4:match = ipv4 version=4 dst=10.0.4.0/24
in4:actions = seqgen4, before ipv4 add dcw, before dcw add mpls bos=yes ttl=3, edit mpls.label=400, send nni4_out

in6:packet = ipv6
in6:match = ipv6 version=6 dst=fd04::/64
in6:actions = seqgen6, before ipv6 add dcw, before dcw add mpls bos=yes ttl=3, edit mpls.label=600, send nni6_out

tun4:packet = mpls, dcw, ipv4
tun4:match = mpls label=400
tun4:actions = readseq dcw, secrcvy4 to_uni

tun6:packet = mpls, dcw, ipv6
tun6:match = mpls label=600
tun6:actions = readseq dcw, secrcvy6 to_uni

to_uni = del mpls, del dcw, send uni
