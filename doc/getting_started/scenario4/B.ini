[interfaces]
uni_in = udp-in iface=b1 ipv=4
uni_in:streams = compound1
nni1_in = udp-in iface=b2 ipv=4
nni1_in:streams = compound2

nni1_out = udp-out iface=b2 dstip=10.0.23.3
nni2_out = udp-out iface=b3 dstip=10.0.24.4

[objects]
pef = SeqRcvy

[streams]
compound1:packet = mpls, dcw
compound1:match = mpls label=31
compound1:actions = readseq dcw, replicate member1 member2

member1 = send nni1_out
member2 = pef pef-compound

compound2:packet = mpls, dcw
compound2:match = mpls label=26
compound2:actions = readseq dcw, pef pef-compound

pef-compound = edit mpls.label=31 mpls.bos=1, send nni2_out