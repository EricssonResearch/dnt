[interfaces]
uni_in = udp-in iface=d1 ipv=4
uni_in:streams = compound
nni1_in = udp-in iface=d2
nni1_in:streams = members

nni1_out = udp-out iface=d2 dstip=10.0.45.5
nni2_out = udp-out iface=d3 dstip=10.0.46.6

[objects]
pef = SeqRcvy

[streams]
compound:packet = mpls, dcw
compound:match = mpls label=31
compound:actions = readseq dcw, replicate member1 member2

member1 = send nni1_out
member2 = pef pef-compound

members:packet = mpls, dcw
members:match = mpls label=26
members:actions = readseq dcw, pef pef-compound

pef-compound = edit mpls.label=31 mpls.bos=1, send nni2_out