[interfaces]
uni_eth = eth iface=eth0

nni1_in = udp-in iface=f1
nni1_in:streams = compound
nni2_in = udp-in iface=f2
nni2_in:streams = compound2

[objects]
pef = SeqRcvy

[streams]
compound:packet = mpls, dcw, eth
compound:match = mpls label=31
compound:actions = readseq dcw, del mpls, del dcw, pef pef-compound

compound2:packet = mpls, dcw, eth
compound2:match = mpls label=26
compound2:actions = readseq dcw, del mpls, del dcw, pef pef-compound

pef-compound = send uni_eth