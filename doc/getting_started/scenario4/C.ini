[interfaces]
uni_in = udp-in iface=c1 ipv=4
uni_in:streams = compound
nni1_in = udp-in iface=c2
nni1_in:streams = members

nni1_out = udp-out iface=c2 dstip=10.0.23.2
nni2_out = udp-out iface=c3 dstip=10.0.35.5

[objects]
pef = SeqRcvy

[streams]
compound:packet = mpls, dcw
compound:match = mpls label=26
compound:actions = readseq dcw, replicate member1 member2

member1 = send nni1_out
member2 = pef pef-compound

members:packet = mpls, dcw
members:match = mpls label=31
members:actions = readseq dcw, pef pef-compound

pef-compound = edit mpls.label=26 mpls.bos=1, send nni2_out
