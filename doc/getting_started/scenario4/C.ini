[interfaces]
uni_in = udp-in iface=c1 ipv=4
uni_in:streams = compound1
nni1_in = udp-in iface=c2 ipv=4
nni1_in:streams = compound2

nni1_out = udp-out iface=c2 dstip=10.0.23.2
nni2_out = udp-out iface=c3 dstip=10.0.35.5

[objects]
pef = SeqRcvy

[streams]
compound1:packet = mpls, dcw
compound1:match = mpls label=26
compound1:actions = readseq dcw, replicate member1 member2

member1 = send nni1_out
member2 = pef pef-compound

compound2:packet = mpls, dcw
compound2:match = mpls label=31
compound2:actions = readseq dcw, pef pef-compound

pef-compound = edit mpls.label=26 mpls.bos=1, send nni2_out
