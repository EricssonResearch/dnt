# The [interfaces] section can be used to define the ingress/egress interfaces
# and their streams. The format is the following:
# iface_custom_name = type param1=value1 param2=value2
# For ingress interfaces, the must have a stream list.
# This can be defined as iface_custom_name:streams = stream1 stream2 stream3...
# An ingress packet will be triet to match by each stream (in the order they defined in the list)
# If no match, it will be dropped

[interfaces]
# uni is the name we refer to this interfaces in the rest of the config file
# eth is the type and implemented as a raw layer 2 packet-socket
# For eth type, only the iface parameter required, which is the name if the name of a Linux network interface
# uni:streams is the list of the streams tried to match for ingress packets, currently only 1 stream
#   given for each interface
uni = eth iface=swp2
uni:streams = compound_uni
nni1 = eth iface=swp0
nni1:streams = member1_uni
nni2 = eth iface=swp1
nni2:streams = member2_uni

# In the [objects] section we have the stateful packet processing information.
# These object can be used as parameters of actions in the pipelines.
# The same object can be used in multiple pipelines as well.
# Every object has a type, it is possible to define multiple action with the same type,
# however they has to have different names e.g.
# Gen1 = SeqGen
# Gen2 = SeqGen
# another_gen = SeqGen
# They have their own internal states
# The former looks like the following:
# obj_name = type param1=val1 param2=val2...
# (the type is mandatory, parameters might have or not, depends on the action)
[objects]
# SeqGen generate seqence number every time when it executed in the pipeline.
# This sequence number will be set to that packet, but NOT WRITTEN INTO ANY HEADER by default.
# The rationale behind this behavior: a sequence number can be used in different parts of the pipeline,
# and for both TSN R-tag and DetNet d-CW, its format depends on the heade used. Also one can generate a
# seqence number, but that used on different branches of the pipeline.
# For example, if a pipeline have 3 branches, each with different encapsulation, it only makes sense to
# generate the sequence number early, since if they generated on the branches, each branch will increase the
# internal state sequence number, resulting undefined behavior
Gen = SeqGen InitSeqStart=0
# If the packet has sequence number, we can replicate it to multiple pipelines.
# The stateful verion of that action is the Replicate object, which counts the number of the replicated packets.
# If that information not required, the replicate pipeline1 ... pipelineN stateless action can be used instead
Repl = Replicate
# SeqRcvy is used at the elimination side. Its working with sequence number of the packet, so before
# a SeqRcvy object used in the action pipeline, the packet MUST HAVE SEQUENCE NUMBER.
# This will be obtained from the sequenced header like rtag or dcw with the "readseq HEADERNAME" action.
# SeqRcvy drop every replica of the packet, except the first one.
Elim = SeqRcvy

# Here the [streams] defined, they each have three set of settings as definition:
# :packet - header structure (until we interested)
# :match - matching on header fields for packet identification. Multiple headers and fields can be matched
# :actions - pipeline definition. List of actions executed sequentially.
# The actions in the list separated by commas, they might have parameters as well.
# Some actions can use objects as their parameters and some objects are implicitly recognized as actions
# like Gen, Elim or Replicate or below.
# They can be written as "seqgen Gen" and "eliminate Elim" as well.
[streams]
compound_uni:packet = eth, cvlan
compound_uni:match = cvlan vid=0
compound_uni:actions = Gen, after cvlan add rtag, writeseq rtag, Repl Repl-member1 Repl-member2

# The "Repl" action can be used to branch the pipeline. It copies the packet and execute
# the list of pipelines on the copies - one pipeline on each copy
# In the current example, "Repl Repl-member1 Repl-member2" will create a copy and the original packet
# continue its way on the Repl-member1 pipeline and the copy on the Repl-member2 pipeline.
# There can be more then two pipelines.
# Although the "send" action usually the end of the pipeline, thats optional, other actions
# can be defined after the send action as well and they will executed as usual
Repl-member1 = edit cvlan.vid=100, send nni1
Repl-member2 = edit cvlan.vid=200, send nni2

# The eliminate action (the Elim in the current pipeline)
# used to execute the seq recovery algorithm on the sequence numbered packets.
# The eliminate action have one mandatory paramter: the pipeline to execute after the elimination.
# If the packet not dropped (the first among many packets from the same sequence number)
# will continue the processing on the Elim-compound.
# This is similar to the replicate, however it used to merge pipelines instead of branching.

member1_uni:packet = eth, cvlan, rtag
member1_uni:match = cvlan vid=100
member1_uni:actions = readseq rtag, Elim Elim-compound

member2_uni:packet = eth, cvlan, rtag
member2_uni:match = cvlan vid=200
member2_uni:actions = readseq rtag, Elim Elim-compound

Elim-compound = del rtag, del cvlan, send uni
