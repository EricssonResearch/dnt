[interfaces]
uni = eth iface=swp2
uni:streams = stream_tsn compound
nni1_in = udp-in iface=swp0 ipv=4
nni1_in:streams = stream_nni stream_nni2
nni2_in = udp-in iface=swp1 ipv=4
nni2_in:streams = stream_nni stream_nni2
nni1_out = udp-out iface=swp0 dstip=192.168.55.2
nni2_out = udp-out iface=swp1 dstip=192.168.66.2

[objects]
prf = SeqGen InitSeqStart=0
pef = SeqRcvy

[streams]

compound:packet = eth, cvlan
compound:match = cvlan vid=0 
compound:actions = prf, edit cvlan.vid=99, before eth add mpls, after mpls add dcw, writeseq dcw, replicate a_nni1_out a_nni2_out

a_nni1_out = edit mpls.label=100 mpls.bos=1, send nni1_out
a_nni2_out = edit mpls.label=200 mpls.bos=1, send nni2_out

stream_tsn:packet = eth, cvlan
stream_tsn:match = cvlan vid=0 pcp=6
stream_tsn:actions = prf, edit cvlan.vid=200, before eth add mpls, after mpls add dcw, writeseq dcw, replicate a_nni1_out2 a_nni2_out2

a_nni1_out2 = edit mpls.label=500 mpls.bos=1, send nni1_out
a_nni2_out2 = edit mpls.label=500 mpls.bos=1, send nni2_out

stream_nni:packet = mpls, dcw, eth, cvlan
stream_nni:match = mpls label=500
stream_nni:actions = readseq dcw, pef, del dcw, del mpls, edit cvlan.vid=0, send uni

stream_nni2:packet = mpls, dcw, eth, cvlan
stream_nni2:match = cvlan vid=99
stream_nni2:actions = readseq dcw, pef, del dcw, del mpls, del cvlan, send uni

