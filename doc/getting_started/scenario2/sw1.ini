[interfaces]
uni = eth iface=sw1p0
uni:streams = stream_uni
nni1_in = udp-in iface=sw1p1 ipv=4
nni1_in:streams = stream_nni
nni2_in = udp-in iface=sw1p2 ipv=4
nni2_in:streams = stream_nni
nni1_out = udp-out iface=sw1p1 dstip=192.168.55.2
nni2_out = udp-out iface=sw1p2 dstip=192.168.66.2

[objects]
seq_gen = SeqGen InitSeqStart=0
seqrcvy = SeqRcvy

[streams]
stream_uni:packet = eth, cvlan
stream_uni:match = cvlan vid=0
stream_uni:actions = seq_gen, edit cvlan.vid=99, before eth add mpls, after mpls add dcw, writeseq dcw, replicate nni1_out nni2_out

nni1_out = edit mpls.label=100 mpls.bos=1, send nni1_out
nni2_out = edit mpls.label=200 mpls.bos=1, send nni2_out

stream_nni:packet = mpls, dcw, eth, cvlan
stream_nni:match = cvlan vid=99
stream_nni:actions = readseq dcw, seqrcvy, del dcw, del mpls, del cvlan, send uni
