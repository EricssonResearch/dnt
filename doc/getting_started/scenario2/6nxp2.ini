[interfaces]
uni = eth iface=swp2
uni:streams = compound
nni1_in = udp-in iface=swp0 ipv=6
nni1_in:streams = stream_nni
nni2_in = udp-in iface=swp1 ipv=6
nni2_in:streams = stream_nni
nni1_out = udp-out iface=swp0 dstip=fd01::1
nni2_out = udp-out iface=swp1 dstip=fd02::1

[objects]
prf = SeqGen InitSeqStart=0
pef = SeqRcvy

[streams]
compound:packet = eth, cvlan
compound:match = cvlan vid=0
compound:actions = prf, edit cvlan.vid=99, before eth add mpls, after mpls add dcw, writeseq dcw, replicate nni1_out nni2_out

nni1_out = edit mpls.label=100 mpls.bos=1, send nni1_out
nni2_out = edit mpls.label=200 mpls.bos=1, send nni2_out

stream_nni:packet = mpls, dcw, eth, cvlan
stream_nni:match = cvlan vid=99
stream_nni:actions = readseq dcw, pef, del dcw, del mpls, del cvlan, send uni
