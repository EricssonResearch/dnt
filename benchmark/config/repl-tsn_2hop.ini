[interfaces]
uni = eth iface=eth0
uni:streams = compound_uni
nni1 = eth iface=eth1
nni1:streams = member1_nni
nni2 = eth iface=eth2
nni2:streams = member2_nni


[objects]
sgen = SeqGen
repl = Replicate
elim = SeqRcvy

[streams]
compound_uni:packet = eth, cvlan
compound_uni:match = cvlan vid=0
compound_uni:actions = sgen, after cvlan add rtag, writeseq rtag, repl m1 m2
m1 =  edit cvlan.vid=100, send nni1
m2 =  edit cvlan.vid=200, send nni2

member1_nni:packet = eth, cvlan, rtag
member1_nni:match = cvlan vid=100
member1_nni:actions = readseq rtag, elim to_uni

member2_nni:packet = eth, cvlan, rtag
member2_nni:match = cvlan vid=200
member2_nni:actions = readseq rtag, elim to_uni

to_uni = del rtag, del cvlan, send uni