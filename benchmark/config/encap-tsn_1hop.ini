[interfaces]
if_talker = eth iface=eth1
if_talker:streams = from_talker
if_listener = eth iface=eth2
if_listener:streams = from_listener
if_int1 = internal
if_int1:streams = int1
if_int2 = internal
if_int2:streams = int2

[objects]
sgen1 = SeqGen
sgen2 = SeqGen

[streams]
from_talker:packet = eth, cvlan
from_talker:match =
from_talker:actions = sgen1, after cvlan add rtag, writeseq rtag, edit cvlan.vid=100, send if_int1

int1:packet = eth, cvlan, rtag
int1:match = cvlan vid=100
int1:actions = del rtag, del cvlan, send if_listener

from_listener:packet = eth, cvlan
from_listener:match =
from_listener:actions = sgen2, after cvlan add rtag, writeseq rtag, edit cvlan.vid=200, send if_int2

int2:packet = eth, cvlan, rtag
int2:match = cvlan vid=200
int2:actions=  del rtag, del cvlan, send if_talker
