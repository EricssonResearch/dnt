[interfaces]
if_talker = eth iface=eth1
if_talker:streams = from_talker
if_listener = eth iface=eth2
if_listener:streams = from_listener
if_int1 = internal
if_int1:streams = int1
if_int2 = internal
if_int2:streams = int2

[objects]
sgen1 = SeqGen
sgen2 = SeqGen

[streams]
from_talker:packet = eth, cvlan
from_talker:match =
from_talker:actions = sgen1, edit cvlan.vid=100, before eth add mpls, after mpls add dcw, writeseq dcw, edit mpls.label=100 mpls.bos=1, send if_int1

int1:packet = mpls, dcw, eth, cvlan
int1:match = mpls label=100
int1:actions = readseq dcw, del dcw, del mpls, del cvlan, send if_listener

from_listener:packet = eth, cvlan
from_listener:match =
from_listener:actions = sgen2, edit cvlan.vid=200, before eth add mpls, after mpls add dcw, writeseq dcw, edit mpls.label=200 mpls.bos=1, send if_int2

int2:packet = mpls, dcw, eth, cvlan
int2:match = mpls label=200
int2:actions=  readseq dcw, del dcw, del mpls, del cvlan, send if_talker
