[interfaces]
uni = eth iface=eth0
uni:streams = compound_uni
nni1 = eth iface=eth1
nni1:streams = member1_nni

[objects]
sgen = SeqGen

[streams]
compound_uni:packet = eth, cvlan
compound_uni:match = cvlan vid=0
compound_uni:actions = sgen, after cvlan add rtag, writeseq rtag, edit cvlan.vid=100, send nni1

member1_nni:packet = eth, cvlan, rtag
member1_nni:match = cvlan vid=100
member1_nni:actions = del rtag, del cvlan, send uni