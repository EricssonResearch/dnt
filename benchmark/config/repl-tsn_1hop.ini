[interfaces]
if_talker = eth iface=eth1
if_talker:streams = from_talker
if_listener = eth iface=eth2
if_listener:streams = from_listener
if_int1a = internal
if_int1a:streams = int1a
if_int1b = internal
if_int1b:streams = int1b
if_int2a = internal
if_int2a:streams = int2a
if_int2b = internal
if_int2b:streams = int2b

[objects]
sgen1 = SeqGen
sgen2 = SeqGen
repl1 = Replicate
repl2 = Replicate
elim1 = SeqRcvy
elim2 = SeqRcvy

[streams]
from_talker:packet = eth, cvlan
from_talker:match =
from_talker:actions = sgen1, after cvlan add rtag, writeseq rtag, edit cvlan.vid=100, repl1 talker_replica_a talker_replica_b
talker_replica_a = send if_int1a
talker_replica_b = send if_int1b

int1a:packet = eth, cvlan, rtag
int1a:match = cvlan vid=100
int1a:actions = readseq rtag, elim1 to_listener

int1b:packet = eth, cvlan, rtag
int1b:match = cvlan vid=100
int1b:actions = readseq rtag, elim1 to_listener

to_listener = del rtag, del cvlan, send if_listener

from_listener:packet = eth, cvlan
from_listener:match =
from_listener:actions = sgen2, after cvlan add rtag, writeseq rtag, edit cvlan.vid=200, repl2 listener_replica_a listener_replica_b
listener_replica_a = send if_int2a
listener_replica_b = send if_int2b

int2a:packet = eth, cvlan, rtag
int2a:match = cvlan vid=200
int2a:actions = readseq rtag, elim2 to_talker

int2b:packet = eth, cvlan, rtag
int2b:match = cvlan vid=200
int2b:actions = readseq rtag, elim2 to_talker

to_talker = del rtag, del cvlan, send if_talker

