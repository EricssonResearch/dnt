[interfaces]
if_talker = eth iface=eth1
if_talker:streams = from_talker
if_listener = eth iface=eth2
if_listener:streams = from_listener
if_int1a = internal
if_int1a:streams = int1a
if_int1b = internal
if_int1b:streams = int1b
if_int2a = internal
if_int2a:streams = int2a
if_int2b = internal
if_int2b:streams = int2b

[objects]
sgen1 = SeqGen
sgen2 = SeqGen
repl1 = Replicate
repl2 = Replicate
elim1 = SeqRcvy
elim2 = SeqRcvy

[streams]
from_talker:packet = eth, cvlan
from_talker:match =
from_talker:actions = sgen1, edit cvlan.vid=100, before eth add mpls, after mpls add dcw, writeseq dcw, repl1 talker_replica_a talker_replica_b
talker_replica_a = edit mpls.label=100 mpls.bos=1,send if_int1a
talker_replica_b = edit mpls.label=101 mpls.bos=1,send if_int1b

int1a:packet = mpls, dcw, eth, cvlan
int1a:match = mpls label=100
int1a:actions = readseq dcw, elim1 to_listener

int1b:packet = mpls, dcw, eth, cvlan
int1b:match = mpls label=101
int1b:actions = readseq dcw, elim1 to_listener

to_listener = del dcw, del mpls, del cvlan, send if_listener

from_listener:packet = eth, cvlan
from_listener:match =
from_listener:actions = sgen2, edit cvlan.vid=200, before eth add mpls, after mpls add dcw, writeseq dcw, repl2 listener_replica_a listener_replica_b
listener_replica_a = edit mpls.label=200 mpls.bos=1, send if_int2a
listener_replica_b = edit mpls.label=201 mpls.bos=1, send if_int2b

int2a:packet = mpls, dcw, eth, cvlan
int2a:match = cvlan vid=200
int2a:actions = readseq dcw, elim2 to_talker

int2b:packet = mpls, dcw, eth, cvlan
int2b:match = cvlan vid=201
int2b:actions = readseq dcw, elim2 to_talker

to_talker = del dcw, del mpls, del cvlan, send if_talker

