[interfaces]
uni = eth iface=eth0
uni:streams = compound_uni
nni1 = eth iface=eth1
nni1:streams = member1_uni

[streams]
compound_uni:packet = eth, cvlan
compound_uni:match = cvlan vid=0
compound_uni:actions = del cvlan, send nni1

member1_uni:packet = eth, cvlan
member1_uni:match = cvlan vid=0
member1_uni:actions = del cvlan, send uni