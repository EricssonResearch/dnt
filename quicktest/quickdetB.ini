
[interfaces]

ifA = eth iface=ethBA
ifA:streams = sa
ifCout = udp-out iface=ethBC dstip=10.0.2.3
ifCin  = udp-in iface=ethBC
ifCin:streams = su

[streams]

sa:packet = eth, cvlan
sa:match = cvlan vid=1001
sa:actions = before eth add dcw, before dcw add mpls label=101 bos=1, send ifCout

su:packet = mpls, dcw, eth, cvlan
su:match = mpls label=220
su:actions = del mpls, del dcw, edit cvlan.vid=1001, send ifA
