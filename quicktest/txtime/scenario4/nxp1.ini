[interfaces]
uni_eth = eth iface=swp2
uni_eth:streams = stream_uni_eth
uni_ip = ip iface=swp2
nni1_in = udp-in iface=swp0 ipv=4
nni1_in:streams = stream_nni
nni1_out = udp-out iface=swp0 dstip=192.168.55.2 prio=1

[streams]
stream_uni_eth:packet = eth, cvlan, ipv4
stream_uni_eth:match = cvlan vid=0
stream_uni_eth:actions = del eth, del cvlan, delay 1500 offload, send nni1_out

stream_nni:packet = ipv4
stream_nni:match = ipv4 dst=10.0.100.11
stream_nni:actions = send uni_ip
