# on nb: radvd -C ./radvdB.conf -m stderr -n
# this will autoconfigure address on ethBC and ethCB

interface ethBC {
    AdvSendAdvert on;
    MinRtrAdvInterval 3;
    MaxRtrAdvInterval 10;
    prefix fd02::/64 {
        AdvOnLink on; # default
        AdvAutonomous on; # default
        AdvRouterAddr on;
    };
};
