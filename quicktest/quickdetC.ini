
[interfaces]

ifD = eth iface=ethCD
ifD:streams = sd
ifBout = udp-out iface=ethCB dstip=10.0.2.2
ifBin  = udp-in iface=ethCB
ifBin:streams = su

[streams]

sd:packet = eth, cvlan
sd:match = cvlan vid=3210
sd:actions = before eth add dcw, before dcw add mpls label=220 bos=1, send ifBout

su:packet = mpls, dcw, eth, cvlan
su:match = mpls label=101
su:actions = del mpls, del dcw, edit cvlan.vid=3210, send ifD
