[interfaces]

uni = ip iface=vrf0

nni_in0 = udp-in iface=eth0 ipv=6
nni_in1 = udp-in iface=eth1 ipv=6

nni_out0 = udp-out iface=eth0 dstip=ipv6
nni_out1 = udp-out iface=eth1 dstip=ipv6

uni:streams = compound6
nni_in0:streams = pw6
nni_in1:streams = pw6

ifCmd = oam_cmd
ifReturn0 = oam ip=fd11::2
ifReturn1 = oam ip=fd21::2

[objects]

gen6 = SeqGen
pef6 = SeqRcvy frerSeqRcvyHistoryLength=16
prf6 = Replicate

[streams]

compound6:packet = ipv6
compound6:match = ipv6 version=6 dst=fd66::/64
compound6:actions = gen6, before ipv6 add dcw, before dcw add mpls label=600 bos=1, prf6 prf6-member1 prf6-member2

prf6-member1 = send nni_out0
prf6-member2 = send nni_out1

pw6:packet = mpls, dcw, ipv6
pw6:match = mpls label=600
pw6:actions = readseq dcw, pef6 pwcompound

pwcompound = del mpls, del dcw, send uni

