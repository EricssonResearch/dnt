[interfaces]
uni_ip = ip iface=eth0

nni1_in = udp-in iface=f1 ipv=4
nni1_in:streams = compound1
nni2_in = udp-in iface=f2 ipv=4
nni2_in:streams = compound2

[objects]
pef = SeqRcvy

[streams]
compound1:packet = mpls, dcw, ipv4
compound1:match = mpls label=31
compound1:actions = readseq dcw, del mpls, del dcw, pef pef-compound

compound2:packet = mpls, dcw, ipv4
compound2:match = mpls label=26
compound2:actions = readseq dcw, del mpls, del dcw, pef pef-compound

pef-compound = send uni_ip