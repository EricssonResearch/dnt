[interfaces]
uni_eth = eth iface=eth0
uni_eth:streams = compound

nni1_out = udp-out iface=a1 dstip=10.0.12.2
nni2_out = udp-out iface=a2 dstip=10.0.13.3

[objects]
gen = SeqGen InitSeqStart=0

[streams]
compound:packet = eth, cvlan, ipv4
compound:match = cvlan tpid=ipv4, ipv4 src=192.168.1.1
compound:actions = gen, before eth add mpls bos=1 ttl=64, after mpls add dcw, del eth, del cvlan, replicate member1 member2

member1 = edit mpls.label=31, send nni1_out
member2 = edit mpls.label=26, send nni2_out
