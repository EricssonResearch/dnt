[interfaces]
nni_a_in = udp-in iface=ba ipv=4
nni_a_in:streams = in_a
nni_c_in = udp-in iface=bc ipv=4
nni_c_in:streams = in_c
nni_d_in = udp-in iface=bd ipv=4
nni_d_in:streams = in_d

nni_a_out = udp-out iface=ba dstip=10.0.12.1
nni_c_out = udp-out iface=bc dstip=10.0.23.3
nni_d_out = udp-out iface=bd dstip=10.0.24.4

[streams]
in_a:packet = mpls, dcw
in_a:match = mpls label=222
in_a:actions = gen, writeseq dcw, prf member_c member_d

member_c = send nni_c_out
member_d = send nni_d_out

in_c:packet = mpls, dcw
in_c:match = mpls label=222
in_c:actions = readseq dcw, pef pef-cd

in_d:packet = mpls, dcw
in_d:match = mpls label=222
in_d:actions = readseq dcw, pef pef-cd


pef-cd = send nni_a_out

[objects]
gen = SeqGen InitSeqStart=0
pef = SeqRcvy frerSeqRcvyHistoryLength=16
prf = Replicate



