[interfaces]
uni_in = eth iface=dnteth0
uni_out = ip iface=eth0

uni_in:streams = compound

nni1_out = udp-out iface=ab dstip=10.0.12.2
nni2_out = udp-out iface=ac dstip=10.0.13.3
nni1_in = udp-in iface=ab
nni2_in = udp-in iface=ac

nni1_in:streams = pw
nni2_in:streams = pw

ifNotify = udp-out iface=mgmt dstip=172.16.0.254 dstport=6001

cmd0 = oam_cmd ip=172.16.0.1 port=8000
oam0 = oam ip=172.16.0.1 port=6634

[streams]
compound:packet = eth, cvlan, ipv4
compound:match = ipv4 src=192.168.1.1
compound:actions = gen, del eth, del cvlan, before ipv4 add dcw, before dcw add mpls bos=1 ttl=16, prf member1 member2
; compound:packet = mpls
; compound:match =  mpls label=0
; compound:actions = gen, after mpls add dcw, edit mpls bos=1 ttl=16, prf member1 member2

member1 = edit mpls.label=222, send nni1_out
member2 = edit mpls.label=222, send nni2_out

pw:packet = mpls, dcw, ipv4
pw:match = mpls label=222
pw:actions =  readseq dcw, pef compound_out
; pw:actions = readseq dcw, pef compound_out

compound_out = del mpls, del dcw,send uni_out

notification_session = send ifNotify

[objects]
gen = SeqGen InitSeqStart=0
pef = SeqRcvy AutoMIP=3 frerSeqRcvyHistoryLength=16
prf = Replicate AutoMIP=3 
