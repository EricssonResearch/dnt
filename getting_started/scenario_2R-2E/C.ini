[interfaces]
nni_a_in = udp-in iface=ca ipv=4
nni_a_in:streams = in_a
nni_b_in = udp-in iface=cb ipv=4
nni_b_in:streams = in_b
nni_d_in = udp-in iface=cd ipv=4
nni_d_in:streams = in_d

nni_a_out = udp-out iface=ca dstip=10.0.13.1
nni_b_out = udp-out iface=cb dstip=10.0.23.3
nni_d_out = udp-out iface=cd dstip=10.0.45.4

[streams]
in_d:packet = mpls, dcw
in_d:match = mpls label=222
in_d:actions = gen, writeseq dcw, replicate member_a member_b

member_a = send nni_a_out
member_b = send nni_b_out

in_a:packet = mpls, dcw
in_a:match = mpls label=222
in_a:actions = readseq dcw, pef pef-cd

in_b:packet = mpls, dcw
in_b:match = mpls label=222
in_b:actions = readseq dcw, pef pef-cd


pef-cd = send nni_d_out

[objects]
gen = SeqGen InitSeqStart=0
pef = SeqRcvy frerSeqRcvyHistoryLength=16
prf = Replicate



