# this is based on the C++.gitlab-ci.yml template

# only run automatically on the main branch
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"

# this Docker image should contain everything we need
image: mtmkls/ci-runner:v2

stages:
  - verify
  - build
  - test

verify-ci-config:
  stage: verify
  tags:
    - rosetta-docker
  script:
    - gitlab-ci/verify_yaml.pl


build-r2dtwo-debug:
  stage: build
  tags:
    - rosetta-docker
  script:
    - CC=gcc make debug -j
  artifacts:
    paths:
      - r2dtwo

build-r2dtwo-release:
  stage: build
  tags:
    - rosetta-docker
  script:
    - CC=gcc make release -j

build-r2dtwo-debug-cpp:
  stage: build
  tags:
    - rosetta-docker
  script:
    - gitlab-ci/cppize.pl Makefile
    - make debug -j

build-r2dtwo-release-cpp:
  stage: build
  tags:
    - rosetta-docker
  script:
    - gitlab-ci/cppize.pl Makefile
    - make release -j

build-r2dtwo-debug-clang:
  stage: build
  tags:
    - rosetta-docker
  script:
    - CC=clang make debug -j

build-r2dtwo-release-clang:
  stage: build
  tags:
    - rosetta-docker
  script:
    - CC=clang make release -j


build-unit_test:
  stage: build
  tags:
    - rosetta-docker
  script:
    - cd unit_test
    - mkdir build
    - cd build
    - cmake ..
    - make -j
  artifacts:
    paths:
      - unit_test/build/test_*


.pytest.common:
  stage: test
  tags:
    - tsn
  dependencies:
    - build-r2dtwo-debug

pytest_oam:
  extends: .pytest.common
  script:
    - cd test
    - ./oam.py
  allow_failure: true

pytest_elimination:
  extends: .pytest.common
  script:
    - cd test
    - ./sequence.py
  allow_failure: false

pytest_match:
  extends: .pytest.common
  script:
    - cd test
    - ./match.py
  allow_failure: false

pytest_mask:
  extends: .pytest.common
  script:
    - cd test
    - ./mask.py
  allow_failure: false

pytest_pof:
  extends: .pytest.common
  script:
    - cd test
    - ./pof.py
  allow_failure: false

pytest_delay:
  extends: .pytest.common
  script:
    - cd test
    - ./delay.py
  allow_failure: false

pytest_stress:
  extends: .pytest.common
  script:
    - cd test
    - ./stress.py
  allow_failure: false


.unit_test.common:
  stage: test
  tags:
    - rosetta-docker
  dependencies:
    - build-unit_test

unit_test.conf_utils:
  extends: .unit_test.common
  script:
    - valgrind --error-exitcode=42 --leak-check=full unit_test/build/test_conf_utils

