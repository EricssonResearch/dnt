# this is based on the C++.gitlab-ci.yml template

# run on the main branch, from web, for merge requests
#   only run for feature branch commits when there is no associated merge request
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_OPEN_MERGE_REQUESTS
      when: never
    - when: always

# this Docker image should contain everything we need
image: mtmkls/ci-runner:v2

stages:
  - verify
  - build
  - test

verify-ci-config:
  stage: verify
  tags:
    - tsn
  script:
    - .gitlab-ci/verify_yaml.pl


build-r2dtwo-debug:
  stage: build
  tags:
    - tsn
  script:
    - CC=gcc make debug -j
  artifacts:
    paths:
      - r2dtwo

build-r2dtwo-release:
  stage: build
  tags:
    - tsn
  script:
    - CC=gcc make release -j

build-r2dtwo-debug-cpp:
  stage: build
  tags:
    - tsn
  script:
    - .gitlab-ci/cppize.pl Makefile
    - make debug -j

build-r2dtwo-release-cpp:
  stage: build
  tags:
    - tsn
  script:
    - .gitlab-ci/cppize.pl Makefile
    - make release -j

build-r2dtwo-debug-clang:
  stage: build
  tags:
    - tsn
  script:
    - CC=clang make debug -j

build-r2dtwo-release-clang:
  stage: build
  tags:
    - tsn
  script:
    - CC=clang make release -j


build-unit_test:
  stage: build
  tags:
    - tsn
  script:
    - cd unit_test
    - mkdir build
    - cd build
    - cmake ..
    - make -j
  artifacts:
    paths:
      - unit_test/build/test_*


.pytest.common:
  stage: test
  tags:
    - tsn
  dependencies:
    - build-r2dtwo-debug
  retry: 2

pytest_oam:
  extends: .pytest.common
  script:
    - cd test
    - python3 -m oam.oam
  allow_failure: false

pytest_oam_tsn:
  extends: .pytest.common
  script:
    - cd test
    - python3 -m oam_tsn.oam_tsn
  allow_failure: false

pytest_elimination:
  extends: .pytest.common
  script:
    - cd test
    - python3 -m sequence.sequence
  allow_failure: false

pytest_match:
  extends: .pytest.common
  script:
    - cd test
    - python3 -m match.match
  allow_failure: false

pytest_mask:
  extends: .pytest.common
  script:
    - cd test
    - python3 -m mask.mask
  allow_failure: false

pytest_pof:
  extends: .pytest.common
  script:
    - cd test
    - python3 -m pof.pof
  allow_failure: false

pytest_delay:
  extends: .pytest.common
  script:
    - cd test
    - python3 -m delay.delay
  allow_failure: false

pytest_stress:
  extends: .pytest.common
  script:
    - cd test
    - python3 -m stress.stress_ping
  allow_failure: false

pytest_srv6:
  extends: .pytest.common
  script:
    - cd test
    - python3 -m srv6.srv6
  allow_failure: false

.unit_test.common:
  stage: test
  tags:
    - tsn
  dependencies:
    - build-unit_test
  script:
    - TEST_COLOR=1 valgrind --error-exitcode=42 --leak-check=full unit_test/build/$TESTNAME

unit_test.conf_utils:
  extends: .unit_test.common
  variables:
    TESTNAME: test_conf_utils

unit_test.header_api:
  extends: .unit_test.common
  variables:
    TESTNAME: test_header_api

unit_test.header_compare:
  extends: .unit_test.common
  variables:
    TESTNAME: test_header_compare

unit_test.header_read:
  extends: .unit_test.common
  variables:
    TESTNAME: test_header_read

unit_test.header_write:
  extends: .unit_test.common
  variables:
    TESTNAME: test_header_write

unit_test.if_utils:
  extends: .unit_test.common
  variables:
    TESTNAME: test_if_utils

unit_test.inet_utils:
  extends: .unit_test.common
  variables:
    TESTNAME: test_inet_utils

unit_test.packet:
  extends: .unit_test.common
  variables:
    TESTNAME: test_packet

unit_test.seq_rcvy_match:
  extends: .unit_test.common
  variables:
    TESTNAME: test_seq_rcvy_match

unit_test.seq_rcvy_oam:
  extends: .unit_test.common
  variables:
    TESTNAME: test_seq_rcvy_oam

unit_test.seq_rcvy_vector:
  extends: .unit_test.common
  variables:
    TESTNAME: test_seq_rcvy_vector

unit_test.thread:
  extends: .unit_test.common
  variables:
    TESTNAME: test_thread

unit_test.time:
  extends: .unit_test.common
  variables:
    TESTNAME: test_time

unit_test.utils:
  extends: .unit_test.common
  variables:
    TESTNAME: test_utils
